<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRP Import - Foodline</title>
    
    <!-- PWA та іконки -->
    <meta name="theme-color" content="#f97316">
    <link rel="apple-touch-icon" href="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp">
    
    <!-- Підключаємо TailwindCSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Підключаємо React, Babel та html2pdf -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js" crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <style>
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #f97316; }
        
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="date"]::-webkit-calendar-picker-indicator { margin-left: -2px; padding: 0px; cursor: pointer; }

        /* Стилі для правильного експорту в PDF без зсувів */
        .pdf-exporting { 
            width: 1450px !important; 
            max-width: 1450px !important;
            background-color: #f8fafc !important; 
            padding: 10px !important; 
            margin: 0 !important;
            left: 0 !important;
            top: 0 !important;
        }
        .pdf-exporting .overflow-x-auto { overflow: visible !important; }
        .pdf-exporting .sticky { position: relative !important; box-shadow: none !important; border-bottom: 1px solid #e2e8f0 !important; }
        .pdf-exporting .no-print { display: none !important; }
        .pdf-exporting input { border: none !important; background: transparent !important; padding: 0 !important; box-shadow: none !important; }
        
        .accordion-content { transition: max-height 0.3s ease-in-out, opacity 0.3s ease-in-out, padding 0.3s ease; overflow: hidden; }
        .accordion-collapsed { max-height: 0; opacity: 0; padding-top: 0; padding-bottom: 0; border: none; }
        .accordion-expanded { max-height: 1200px; opacity: 1; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // --- ІКОНКИ ---
        const IconPlus = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconAlert = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconSparkles = ({className="w-3 h-3"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
        const IconLoader = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconRefresh = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;
        const IconInfo = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconPDF = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>;
        const IconSettings = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconSave = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>;
        const IconChart = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>;
        const IconSearch = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>;

        const formatNum = (val) => {
            if (val === null || val === undefined || isNaN(val) || val === '') return '-';
            return Math.round(val).toLocaleString('uk-UA');
        };

        // --- ГРАФІК КОМПОНЕНТ З ДАТАМИ ВІДПРАВКИ ТА ЛІНІЯМИ ЗАПАСІВ ---
        const StockChart = ({ item, metrics, todayStr, minMonths, overMonths }) => {
            const width = 1400; 
            const height = 280;
            const padLeft = 70;
            const padRight = 60;
            const padTop = 30;
            const padBottom = 35;
            const innerWidth = width - padLeft - padRight;
            const innerHeight = height - padTop - padBottom;

            const today = new Date(todayStr);
            today.setHours(0,0,0,0);
            
            const C_daily = (Number(item.consumption) || 0) / 30;
            const C_monthly = Number(item.consumption) || 0;
            const S0 = Number(item.stock) || 0;

            const deliveries = [
                { qty: Number(item.d1Qty)||0, date: item.d1Date ? new Date(item.d1Date) : null, sendDate: item.d1Send ? new Date(item.d1Send) : null },
                { qty: Number(item.d2Qty)||0, date: item.d2Date ? new Date(item.d2Date) : null, sendDate: item.d2Send ? new Date(item.d2Send) : null },
                { qty: Number(item.d3Qty)||0, date: item.d3Date ? new Date(item.d3Date) : null, sendDate: item.d3Send ? new Date(item.d3Send) : null }
            ].filter(d => d.date && !isNaN(d.date)).sort((a,b) => a.date - b.date);

            let currentStock = S0;
            let points = [{ day: 0, stock: S0 }];
            
            let maxDay = 180; 
            if (deliveries.length > 0) {
                const lastDelDay = Math.max(0, Math.ceil((deliveries[deliveries.length-1].date - today) / (1000*60*60*24)));
                maxDay = Math.max(180, lastDelDay + 15);
            }

            let lastDay = 0;
            deliveries.forEach(d => {
                const day = Math.max(0, Math.ceil((d.date - today) / (1000*60*60*24)));
                if (day > lastDay) {
                    const beforeStock = currentStock - (day - lastDay) * C_daily;
                    points.push({ day: day, stock: beforeStock });
                    currentStock = beforeStock + d.qty;
                    points.push({ day: day, stock: currentStock }); 
                    lastDay = day;
                }
            });
            points.push({ day: maxDay, stock: currentStock - (maxDay - lastDay) * C_daily });

            // Розрахунок точок відправки для графіка
            const sendPoints = [];
            deliveries.forEach((d, index) => {
                if (d.sendDate && !isNaN(d.sendDate)) {
                    const sendDay = Math.ceil((d.sendDate - today) / (1000*60*60*24));
                    if (sendDay >= 0 && sendDay <= maxDay) {
                        // Рахуємо залишок на день відправки
                        let stockAtSend = S0;
                        if (sendDay > 0) {
                            stockAtSend -= sendDay * C_daily;
                            deliveries.forEach(del => {
                                const delDay = Math.ceil((del.date - today) / (1000*60*60*24));
                                if (delDay <= sendDay) stockAtSend += del.qty;
                            });
                        }
                        sendPoints.push({ day: sendDay, stock: stockAtSend, label: `Відпр. №${index+1}` });
                    }
                }
            });

            const minStock = C_monthly * Number(minMonths); 
            const overStock = C_monthly * Number(overMonths);

            const maxStockVal = Math.max(...points.map(p => p.stock), minStock, overStock);
            const minStockVal = Math.min(...points.map(p => p.stock), 0);
            
            const yMax = Math.max(maxStockVal * 1.1, overStock * 1.1);
            const yMin = Math.min(0, minStockVal - (Math.abs(minStockVal) * 0.1)); 
            const yRange = yMax - yMin;
            
            const getX = (day) => padLeft + (day / maxDay) * innerWidth;
            const getY = (stock) => padTop + innerHeight - ((stock - yMin) / (yRange || 1)) * innerHeight;

            const pathD = points.map((p, i) => `${i===0 ? 'M' : 'L'} ${getX(p.day)},${getY(p.stock)}`).join(' ');
            
            const zeroY = getY(0);
            const minY = getY(minStock);
            const overY = getY(overStock);

            const xTicks = [];
            for (let i = 0; i <= maxDay; i += 30) {
                const d = new Date(today.getTime() + i * 86400000);
                xTicks.push({ day: i, label: d.toLocaleDateString('uk-UA', { day: '2-digit', month: '2-digit' }) });
            }

            return (
                <div className="w-full overflow-x-auto border border-slate-200 rounded-lg p-4 bg-white shadow-sm">
                    <svg width="100%" height="auto" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet" className="min-w-[1000px]">
                        <line x1={padLeft} y1={padTop} x2={width-padRight} y2={padTop} stroke="#e2e8f0" strokeDasharray="3 3" />
                        <text x={padLeft - 8} y={padTop + 4} fill="#64748b" fontSize="12" textAnchor="end" fontWeight="bold">{formatNum(yMax)}</text>
                        
                        {overStock > 0 && overStock < yMax && (
                            <g>
                                <line x1={padLeft} y1={overY} x2={width-padRight} y2={overY} stroke="#8b5cf6" strokeWidth="1.5" strokeDasharray="6 4" />
                                <text x={padLeft - 8} y={overY + 4} fill="#8b5cf6" fontSize="12" textAnchor="end" fontWeight="bold">Оверсток</text>
                                <text x={width - padRight + 8} y={overY + 4} fill="#8b5cf6" fontSize="11" textAnchor="start">{overMonths} міс.</text>
                            </g>
                        )}

                        {minStock > 0 && minStock < yMax && (
                            <g>
                                <line x1={padLeft} y1={minY} x2={width-padRight} y2={minY} stroke="#f59e0b" strokeWidth="1.5" strokeDasharray="6 4" />
                                <text x={padLeft - 8} y={minY + 4} fill="#f59e0b" fontSize="12" textAnchor="end" fontWeight="bold">Мін. запас</text>
                                <text x={width - padRight + 8} y={minY + 4} fill="#f59e0b" fontSize="11" textAnchor="start">{minMonths} міс.</text>
                            </g>
                        )}

                        <line x1={padLeft} y1={zeroY} x2={width-padRight} y2={zeroY} stroke="#ef4444" strokeWidth="1.5" strokeDasharray="4 4" />
                        <text x={padLeft - 8} y={zeroY + 4} fill="#ef4444" fontSize="12" textAnchor="end" fontWeight="bold">0</text>
                        
                        {yMin < 0 && (
                            <text x={padLeft - 8} y={getY(yMin) + 4} fill="#ef4444" fontSize="12" textAnchor="end">{formatNum(yMin)}</text>
                        )}

                        <line x1={padLeft} y1={padTop} x2={padLeft} y2={height - padBottom} stroke="#94a3b8" strokeWidth="2" />
                        <line x1={padLeft} y1={height - padBottom} x2={width-padRight} y2={height - padBottom} stroke="#94a3b8" strokeWidth="2" />

                        {xTicks.map((t, idx) => (
                            <g key={t.day}>
                                <line x1={getX(t.day)} y1={height - padBottom} x2={getX(t.day)} y2={height - padBottom + 6} stroke="#94a3b8" strokeWidth="2" />
                                <text x={getX(t.day)} y={height - padBottom + 20} fontSize="12" fill="#64748b" textAnchor="middle" fontWeight="500">{t.label}</text>
                            </g>
                        ))}

                        {/* Точки відправки (вертикальні лінії) */}
                        {sendPoints.map((sp, i) => (
                            <g key={`send-${i}`}>
                                <line x1={getX(sp.day)} y1={getY(sp.stock)} x2={getX(sp.day)} y2={height - padBottom} stroke="#f97316" strokeWidth="1.5" strokeDasharray="4 4" />
                                <circle cx={getX(sp.day)} cy={getY(sp.stock)} r="4" fill="#f97316" />
                                <text x={getX(sp.day) + 5} y={getY(sp.stock) - 10} fontSize="11" fill="#f97316" fontWeight="bold">{sp.label}</text>
                            </g>
                        ))}

                        <path d={pathD} fill="none" stroke="#3b82f6" strokeWidth="3" strokeLinejoin="round" />
                        
                        {/* Точки прибуття */}
                        {points.map((p, i) => {
                            if (i > 0 && points[i-1].day === p.day && points[i-1].stock < p.stock) {
                                return (
                                    <g key={i}>
                                        <circle cx={getX(p.day)} cy={getY(p.stock)} r="5" fill="#10b981" />
                                        <text x={getX(p.day) - 8} y={getY(p.stock) - 12} fontSize="13" fill="#047857" fontWeight="bold" textAnchor="end">
                                            {formatNum(p.stock)}
                                        </text>
                                    </g>
                                );
                            }
                            if (i === 0) return <circle key={i} cx={getX(p.day)} cy={getY(p.stock)} r="5" fill="#3b82f6" />;
                            return null;
                        })}
                    </svg>
                </div>
            );
        };

        function App() {
            const [reportDate] = useState(new Date().toISOString().split('T')[0]); 
            const [items, setItems] = useState([]);
            const [isImporting, setIsImporting] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            const [errorMsg, setErrorMsg] = useState("");
            const [aiInsights, setAiInsights] = useState({});
            const [loadingAi, setLoadingAi] = useState({});
            const [lastUpdated, setLastUpdated] = useState("Оновлюється...");
            
            const [expandedChart, setExpandedChart] = useState({}); 
            const [expandedAi, setExpandedAi] = useState({});

            const [activeTab, setActiveTab] = useState('main');
            const [searchQuery, setSearchQuery] = useState("");
            const [filterStatus, setFilterStatus] = useState("all");
            const [sortBy, setSortBy] = useState("default");
            
            const [settings, setSettings] = useState({ 
                order: 20, 
                sea: 60, 
                port: 30,
                minStock: 1.5,
                overStock: 5
            });

            const totalLeadTime = Number(settings.order) + Number(settings.sea) + Number(settings.port);

            useEffect(() => {
                handleLoadFromGoogle(true);
            }, []);

            const parseNumberSafe = (val) => {
                if (!val) return 0;
                const cleaned = String(val).replace(/[\s\u00A0]/g, '').replace(',', '.').replace(/['"]/g, '');
                const num = parseFloat(cleaned);
                return isNaN(num) ? 0 : num;
            };

            const parseDateStr = (dateStr) => {
                if (!dateStr) return '';
                let d = String(dateStr).replace(/['"]/g, '').trim();
                if (!d || d === '-') return '';
                if (d.includes('.')) {
                    const parts = d.split('.');
                    if (parts.length === 3) {
                        const day = parts[0].padStart(2, '0');
                        const month = parts[1].padStart(2, '0');
                        let year = parts[2];
                        if (year.length === 2) year = '20' + year;
                        return `${year}-${month}-${day}`; 
                    }
                }
                return d;
            };

            const formatDisplayDate = (dString) => {
                if (!dString) return '';
                const parts = dString.split('-');
                if (parts.length === 3) return `${parts[2]}.${parts[1]}.${parts[0]}`;
                return dString;
            };

            const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyMuK5Fh2YcsnutoqGq8L9W6yDg9rAkXM1kk7WkBHohFuBm5-9P8uNZhlR7x7wbOp3b/exec";

            const handleLoadFromGoogle = () => {
                setIsImporting(true);
                setErrorMsg("");
                fetch(GOOGLE_SCRIPT_URL)
                    .then(response => response.json())
                    .then(result => {
                        if (result.error) throw new Error(result.error);
                        const rows = result.data || result;
                        const parsedItems = [];
                        
                        for (let i = 2; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || !row[0]) continue;
                            const name = String(row[0]).trim();
                            if (name === '' || name.toLowerCase().includes('шт') || name.toLowerCase().includes('мес') || name.toLowerCase().includes('итого')) continue;

                            parsedItems.push({
                                id: Date.now() + i,
                                name: name,
                                stock: parseNumberSafe(row[1]),       
                                consumption: parseNumberSafe(row[2]), 
                                d1Send: parseDateStr(row[3]),
                                d1Date: parseDateStr(row[4]),        
                                d1Qty: parseNumberSafe(row[5]),
                                d1Cont: String(row[6] || ''),       
                                d2Send: parseDateStr(row[7]),
                                d2Date: parseDateStr(row[8]),        
                                d2Qty: parseNumberSafe(row[9]), 
                                d2Cont: String(row[10] || ''),      
                                d3Send: parseDateStr(row[11]),
                                d3Date: parseDateStr(row[12]),        
                                d3Qty: parseNumberSafe(row[13]),
                                d3Cont: String(row[14] || ''),
                            });
                        }
                        setItems(parsedItems);
                        const now = new Date();
                        setLastUpdated(`${String(now.getDate()).padStart(2, '0')}.${String(now.getMonth() + 1).padStart(2, '0')}.${now.getFullYear()} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`);
                        setIsImporting(false);
                    })
                    .catch(err => {
                        setErrorMsg("Помилка підключення: " + err.message);
                        setIsImporting(false);
                    });
            };

            const handleSaveToGoogle = () => {
                setIsSaving(true);
                setErrorMsg("");
                const payloadData = items.map(it => [
                    it.name, it.stock, it.consumption,
                    it.d1Send, it.d1Date, it.d1Qty, it.d1Cont || "",
                    it.d2Send, it.d2Date, it.d2Qty, it.d2Cont || "",
                    it.d3Send, it.d3Date, it.d3Qty, it.d3Cont || ""
                ]);
                
                fetch(GOOGLE_SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                    body: JSON.stringify({ action: 'save', data: payloadData })
                })

                const today = new Date(reportDate);
                today.setHours(0, 0, 0, 0);
                const S0 = Number(item.stock) || 0;
                const C_monthly = Number(item.consumption) || 0;
                const C_daily = C_monthly / 30;

                const deliveries = [
                    { id: 1, qty: Number(item.d1Qty) || 0, dateStr: item.d1Date },
                    { id: 2, qty: Number(item.d2Qty) || 0, dateStr: item.d2Date },
                    { id: 3, qty: Number(item.d3Qty) || 0, dateStr: item.d3Date },
                ].map(d => {
                    const dateObj = d.dateStr ? new Date(d.dateStr) : null;
                    return { ...d, dateObj, isValidDate: dateObj && !isNaN(dateObj) };
                });

                const validDeliveries = deliveries.filter(d => d.isValidDate).sort((a, b) => a.dateObj - b.dateObj);

                let runningAddedStock = 0;
                const results = {};

                for (let i = 0; i < validDeliveries.length; i++) {
                    const d = validDeliveries[i];
                    const diffTime = d.dateObj - today;
                    const daysFromToday = Math.max(0, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));

                    const after = before + d.qty;

                    runningAddedStock += d.qty;

                return {
                    currentCoverage: getCov(S0) === '-' ? '0.0' : getCov(S0),

                            if (data.candidates[0].groundingMetadata && data.candidates[0].groundingMetadata.groundingAttributions) {
                                sources = data.candidates[0].groundingMetadata.groundingAttributions
                                    .filter(attr => attr.web && attr.web.uri)

                                                            <div className="flex-1 min-w-0">
                                                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 pl-1 truncate">Залишок (шт)</label>
                                                                <input type="number" value={item.stock} onChange={(e) => handleChange(item.id, 'stock', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-[14px] focus:ring-1 focus:ring-emerald-500 outline-none shadow-sm transition-shadow" />
                                                            </div>
                                                            <div className="flex-1 min-w-0">
                                                                <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 pl-1 truncate">Витрата/міс</label>
                                                                <input type="number" value={item.consumption} onChange={(e) => handleChange(item.id, 'consumption', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-200 rounded-lg px-2.5 py-1.5 text-[14px] focus:ring-1 focus:ring-emerald-500 outline-none shadow-sm transition-shadow" />
                                                            </div>
                                                            <div className="w-[85px] shrink-0 flex flex-col justify-center items-center pt-2">
                                                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Покриття:</span>
                                                                <span className={`text-[16px] font-black leading-none ${parseFloat(m.currentCoverage) < settings.minStock ? 'text-orange-600' : 'text-[#52b788]'}`}>
                                                                    {m.currentCoverage} <span className="text-[11px] font-bold">міс.</span>
                                                                </span>
                                                            </div>
                                                            
                                                            {/* ОКРЕМІ КНОПКИ ДЛЯ ГРАФІКУ ТА ШІ */}
                                                            <div className="flex flex-col gap-1.5 shrink-0 ml-1 pt-4 no-print">
                                                                <button onClick={() => toggleChart(item.id)} className={`${expandedChart[item.id] ? 'bg-blue-100 text-blue-800 border-blue-200' : 'bg-white text-slate-600 border-slate-200 hover:bg-slate-50'} px-2.5 py-1 rounded-lg text-[10px] font-bold flex gap-1.5 items-center justify-center transition-all shadow-sm border`}>
                                                                    <IconChart className="w-3.5 h-3.5 text-blue-500" /> Графік
                                                                </button>
                                                                <button onClick={() => handleAiAnalysis(item, m)} disabled={loadingAi[item.id]} className="bg-[#7c3aed] hover:bg-[#6d28d9] text-white px-2.5 py-1 rounded-lg text-[10px] font-bold flex gap-1.5 items-center justify-center transition-all shadow-sm disabled:opacity-50">
                                                                    {loadingAi[item.id] ? <IconLoader className="animate-spin w-3 h-3" /> : <IconSparkles className="w-3 h-3" />}
                                                                    AI Аналіз
                                                                </button>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* ПРАВА ЧАСТИНА: 3 ДОСТАВКИ */}
                                                    <div className="flex flex-1 divide-x divide-slate-100 bg-white">
                                                        <DeliveryItem num={1} m={m.d1} sendDate={item.d1Send} date={item.d1Date} qty={item.d1Qty} cont={item.d1Cont} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                                        <DeliveryItem num={2} m={m.d2} sendDate={item.d2Send} date={item.d2Date} qty={item.d2Qty} cont={item.d2Cont} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                                        <DeliveryItem num={3} m={m.d3} sendDate={item.d3Send} date={item.d3Date} qty={item.d3Qty} cont={item.d3Cont} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                                    </div>
                                                </div>

                                                {/* АКОРДЕОН: ГРАФІК НА ВСЮ ШИРИНУ */}
                                                <div className={`accordion-content bg-slate-50/50 border-slate-200 ${expandedChart[item.id] ? 'border-t accordion-expanded' : 'accordion-collapsed'}`}>
                                                    <div className="p-5">
                                                        <StockChart item={item} metrics={m} todayStr={reportDate} minMonths={settings.minStock} overMonths={settings.overStock} />
                                                    </div>
                                                </div>

                                                {/* АКОРДЕОН: AI АНАЛІЗ */}
                                                <div className={`accordion-content bg-purple-50/50 border-slate-200 ${expandedAi[item.id] ? 'border-t accordion-expanded' : 'accordion-collapsed'}`}>
                                                    <div className="p-6">
                                                        <div className="flex items-start gap-4">
                                                            <div className="bg-white p-2 rounded-full shadow-sm border border-purple-100 shrink-0">
                                                                <IconSparkles className="w-6 h-6 text-purple-600" />
                                                            </div>
                                                            <div className="flex-1 min-w-0">
                                                                {loadingAi[item.id] ? (
                                                                    <div className="text-sm font-medium text-purple-800 flex items-center gap-2 py-2">
                                                                        <IconLoader className="w-5 h-5 animate-spin" /> ШІ збирає та аналізує логістичні дані...
                                                                    </div>
                                                                ) : insightText ? (
                                                                    <>
                                                                        <div className="whitespace-pre-wrap font-medium leading-relaxed text-[13.5px] text-slate-800 bg-white p-5 rounded-lg border border-purple-100 shadow-sm">
                                                                            {insightText}
                                                                        </div>
                                                                        {insightSources.length > 0 && (
                                                                            <div className="mt-4 pt-3 no-print">
                                                                                <span className="text-[10px] font-bold text-purple-700 uppercase tracking-widest block mb-2">Джерела (Актуальні посилання):</span>
                                                                                <div className="flex flex-wrap gap-2">
                                                                                    {insightSources.map((src, idx) => (
                                                                                        <a key={idx} href={src.uri} target="_blank" rel="noopener noreferrer" 
                                                                                           className="text-[11px] text-blue-700 hover:text-blue-900 underline bg-white px-3 py-1.5 rounded-md border border-purple-200 shadow-sm truncate max-w-full inline-block transition-colors" 
                                                                                           title={src.title}>
                                                                                            🔗 {src.title}
                                                                                        </a>
                                                                                    ))}
                                                                                </div>
                                                                            </div>
                                                                        )}
                                                                    </>
                                                                ) : (
                                                                    <div className="text-sm font-medium text-slate-500 italic py-2">Натисніть кнопку "AI Аналіз", щоб згенерувати звіт.</div>
                                                                )}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>

                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function DeliveryItem({ num, m, sendDate, date, qty, cont, formatNum, handleChange, itemId }) {
            const isDeficitBefore = m.before !== null && m.before < 0;
            const isActive = Number(qty) > 0 || date || sendDate;
            
            let transitDays = '-';
            if (sendDate && date) {
                const s = new Date(sendDate);
                const a = new Date(date);
                if (!isNaN(s) && !isNaN(a)) {
                    transitDays = Math.max(0, Math.round((a - s) / (1000 * 60 * 60 * 24)));
                }
            }

            return (
                <div className={`p-4 w-[330px] shrink-0 flex flex-col justify-between relative transition-colors ${isActive ? 'bg-orange-50/40 border-[0.5px] border-orange-200' : 'hover:bg-slate-50'}`}>
                    
                    <div className="flex justify-between items-center mb-3">
                        <div className="flex items-center gap-2">
                            <span className={`${isActive ? 'bg-orange-100 text-orange-600 border-orange-200' : 'bg-slate-100 text-slate-500 border-slate-200'} rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black border`}>{num}</span>
                            <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Доставка</span>
                        </div>
                        <input type="text" value={cont || ''} onChange={e => handleChange(itemId, `d${num}Cont`, e.target.value)} placeholder="Контейнер №" className="w-28 text-[10px] font-bold border border-slate-200 rounded px-2 py-1 focus:ring-1 focus:ring-orange-500 outline-none text-slate-600 shadow-sm" />
                    </div>

                    <div className="flex gap-1 mb-3 items-end justify-between">
                        <div className="w-[85px] shrink-0">
                            <label className="block text-[8px] font-bold text-slate-400 uppercase mb-1 pl-1">Відправка</label>
                            <input type="date" value={sendDate || ''} onChange={e => handleChange(itemId, `d${num}Send`, e.target.value)} className="w-full text-[10px] font-bold border border-slate-200 rounded px-1 py-1.5 focus:ring-1 focus:ring-orange-500 outline-none text-slate-700 shadow-sm" />
                        </div>
                        
                        <div className="flex flex-col items-center justify-end pb-1.5 px-1 w-[45px]">
                            {sendDate && date && transitDays !== '-' ? (
                                <span className="text-[9px] font-bold text-orange-600 bg-orange-100 px-1 py-0.5 rounded whitespace-nowrap">
                                    {transitDays} дн.
                                </span>
                            ) : (
                                <span className="text-[9px] text-transparent px-1 py-0.5">-</span>
                            )}
                            <div className="w-full h-[1px] bg-slate-300 mt-1"></div>
                        </div>

                        <div className="w-[85px] shrink-0">
                            <label className="block text-[8px] font-bold text-slate-400 uppercase mb-1 pl-1">Прибуття</label>
                            <input type="date" value={date || ''} onChange={e => handleChange(itemId, `d${num}Date`, e.target.value)} className="w-full text-[10px] font-bold border border-slate-200 rounded px-1 py-1.5 focus:ring-1 focus:ring-orange-500 outline-none text-slate-700 shadow-sm" />
                        </div>
                        
                        <div className="flex-1 min-w-0 ml-1">
                            <label className="block text-[8px] font-bold text-slate-400 uppercase mb-1 pl-1">Кільк. (шт)</label>
                            <input type="number" value={qty || ''} onChange={e => handleChange(itemId, `d${num}Qty`, e.target.value)} placeholder="0" className="w-full text-[12px] font-bold border border-slate-200 rounded px-1.5 py-1.5 focus:ring-1 focus:ring-orange-500 outline-none text-blue-600 shadow-sm" />
                        </div>
                    </div>

                    <div className="mt-auto grid grid-cols-[auto_1fr] gap-y-2 items-center px-1 pt-2 border-t border-slate-200/60">
                        <span className="text-[11px] text-slate-500 font-medium">За 1 день до:</span>
                        <div className="text-right truncate">
                            <span className={`text-[13px] font-black tracking-tight ${isDeficitBefore ? 'text-red-600' : 'text-slate-800'}`}>
                                {m.before !== null ? `${formatNum(m.before)} шт` : '- шт'}
                            </span>
                            <span className={`text-[12px] font-bold ml-1 tracking-tight ${isDeficitBefore ? 'text-red-500' : 'text-slate-800'}`}>
                                {m.beforeCovStr !== null ? `(${m.beforeCovStr} міс)` : '(- міс)'}
                            </span>
                        </div>
                        
                        <span className="text-[11px] text-slate-500 font-medium">Після приходу:</span>
                        <div className="text-right truncate">
                            <span className="text-[13px] font-black text-[#52b788] tracking-tight">
                                {m.after !== null ? `${formatNum(m.after)} шт` : '- шт'}
                            </span>
                            <span className="text-[12px] font-bold text-slate-800 ml-1 tracking-tight">
                                {m.covStr !== null ? `(${m.covStr} міс)` : '(- міс)'}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
