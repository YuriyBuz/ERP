<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRP Import - Foodline</title>
    
    <!-- PWA та іконки -->
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp">
    
    <!-- Підключаємо TailwindCSS для стилів -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Підключаємо React та Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ІКОНКИ ---
        const IconPlus = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconAlert = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconCalendar = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconSparkles = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
        const IconLoader = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconRefresh = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;
        const IconInfo = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;

        function App() {
            const [reportDate, setReportDate] = useState(new Date().toISOString().split('T')[0]); 
            const [items, setItems] = useState([]);
            const [isImporting, setIsImporting] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [aiInsights, setAiInsights] = useState({});
            const [loadingAi, setLoadingAi] = useState({});

            useEffect(() => {
                handleLoadFromGoogle(true);
            }, []);

            const parseNumberSafe = (val) => {
                if (!val) return 0;
                const cleaned = String(val).replace(/[\s\u00A0]/g, '').replace(',', '.').replace(/['"]/g, '');
                const num = parseFloat(cleaned);
                return isNaN(num) ? 0 : num;
            };

            const parseDateStr = (dateStr) => {
                if (!dateStr) return '';
                let d = String(dateStr).replace(/['"]/g, '').trim();
                if (!d || d === '-') return '';
                
                if (d.includes('.')) {
                    const parts = d.split('.');
                    if (parts.length === 3) {
                        const day = parts[0].padStart(2, '0');
                        const month = parts[1].padStart(2, '0');
                        let year = parts[2];
                        if (year.length === 2) year = '20' + year;
                        return `${year}-${month}-${day}`;
                    }
                }
                return d;
            };

            const formatNum = (val) => {
                if (val === null || val === undefined || isNaN(val) || val === '') return '-';
                return Math.round(val).toLocaleString('uk-UA');
            };

            // Форматування дати у формат DD-MM-YYYY для відображення
            const formatDisplayDate = (dString) => {
                if (!dString) return '';
                const parts = dString.split('-');
                if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                return dString;
            };

            const handleLoadFromGoogle = (isInitialLoad = false) => {
                setIsImporting(true);
                setErrorMsg("");
                const targetUrl = "https://script.google.com/macros/s/AKfycbyMuK5Fh2YcsnutoqGq8L9W6yDg9rAkXM1kk7WkBHohFuBm5-9P8uNZhlR7x7wbOp3b/exec";

                fetch(targetUrl)
                    .then(response => response.json())
                    .then(result => {
                        if (result.error) throw new Error(result.error);
                        const rows = result.data || result;
                        const parsedItems = [];
                        
                        for (let i = 2; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || !row[0]) continue;
                            
                            const name = String(row[0]).trim();
                            if (name === '' || name.toLowerCase().includes('шт') || name.toLowerCase().includes('мес') || name.toLowerCase().includes('итого')) continue;

                            parsedItems.push({
                                id: Date.now() + i,
                                name: name,
                                stock: parseNumberSafe(row[1]),       
                                consumption: parseNumberSafe(row[2]), 
                                d1Send: parseDateStr(row[3]),
                                d1Date: parseDateStr(row[4]),        
                                d1Qty: parseNumberSafe(row[5]),       
                                d2Send: parseDateStr(row[7]),
                                d2Date: parseDateStr(row[8]),        
                                d2Qty: parseNumberSafe(row[9]),       
                                d3Send: parseDateStr(row[11]),
                                d3Date: parseDateStr(row[12]),        
                                d3Qty: parseNumberSafe(row[13]),      
                            });
                        }

                        setItems(parsedItems);
                        setIsImporting(false);
                    })
                    .catch(err => {
                        setErrorMsg("Помилка підключення: " + err.message);
                        setIsImporting(false);
                    });
            };

            const calculateMetrics = (item) => {
                const today = new Date(reportDate);
                today.setHours(0, 0, 0, 0);
                const S0 = Number(item.stock) || 0;
                const C_monthly = Number(item.consumption) || 0;
                const C_daily = C_monthly / 30;

                const deliveries = [
                    { id: 1, qty: Number(item.d1Qty) || 0, dateStr: item.d1Date },
                    { id: 2, qty: Number(item.d2Qty) || 0, dateStr: item.d2Date },
                    { id: 3, qty: Number(item.d3Qty) || 0, dateStr: item.d3Date },
                ].map(d => {
                    const dateObj = d.dateStr ? new Date(d.dateStr) : null;
                    return { ...d, dateObj, isValidDate: dateObj && !isNaN(dateObj) };
                });

                const validDeliveries = deliveries
                    .filter(d => d.isValidDate)
                    .sort((a, b) => a.dateObj - b.dateObj);

                let runningAddedStock = 0;
                const results = {};

                for (let i = 0; i < validDeliveries.length; i++) {
                    const d = validDeliveries[i];
                    const diffTime = d.dateObj - today;
                    const daysFromToday = Math.max(0, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
                    
                    const before = S0 - (daysFromToday * C_daily) + runningAddedStock;
                    const after = before + d.qty;
                    
                    results[d.id] = { before, after };
                    runningAddedStock += d.qty; 
                }

                const getCov = (val) => (val !== null && C_monthly > 0) ? (val / C_monthly).toFixed(1) : '-';

                return {
                    currentCoverage: getCov(S0) === '-' ? '0.0' : getCov(S0),
                    d1: results[1] ? { ...results[1], covStr: getCov(results[1].after) } : { before: null, after: null, covStr: '-' },
                    d2: results[2] ? { ...results[2], covStr: getCov(results[2].after) } : { before: null, after: null, covStr: '-' },
                    d3: results[3] ? { ...results[3], covStr: getCov(results[3].after) } : { before: null, after: null, covStr: '-' },
                };
            };

            const handleChange = (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                if (aiInsights[id]) {
                    const newInsights = { ...aiInsights };
                    delete newInsights[id];
                    setAiInsights(newInsights);
                }
            };

            const handleAddItem = () => {
                setItems([{
                    id: Date.now(), name: 'Нова позиція', stock: 0, consumption: 0,
                    d1Send: '', d1Qty: 0, d1Date: '', d2Send: '', d2Qty: 0, d2Date: '', d3Send: '', d3Qty: 0, d3Date: ''
                }, ...items]);
            };

            const handleRemoveItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const handleAiAnalysis = async (item, metrics) => {
                setLoadingAi(prev => ({ ...prev, [item.id]: true }));
                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const prompt = `Ти - досвідчений Supply Chain Manager.
                Контекст (Логістичне плече з Китаю):
                - Від замовлення до відвантаження: ~20 днів
                - В дорозі до порту (морем): ~60 днів
                - Від порту до складу: ~30 днів
                Загальний Lead Time: ~110 днів (майже 4 місяці).

                Проаналізуй SKU: "${item.name}". Дата звіту: ${formatDisplayDate(reportDate)}. 
                - Залишок: ${item.stock} шт. 
                - Витрата: ${item.consumption} шт/міс.
                - Поточне покриття: ${metrics.currentCoverage} міс.
                
                Очікувані залишки ДО прибуття запланованих поставок: 
                №1: ${metrics.d1.before !== null ? Math.round(metrics.d1.before) : '-'} шт, 
                №2: ${metrics.d2.before !== null ? Math.round(metrics.d2.before) : '-'} шт.
                
                Завдання: Враховуючи плече у 110 днів, оціни чи є зараз ризик дефіциту, і порекомендуй, коли потрібно робити НОВЕ замовлення. Дай відповідь коротко, списком, українською мовою.`;

                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const data = await response.json();
                    setAiInsights(prev => ({ ...prev, [item.id]: data.candidates?.[0]?.content?.parts?.[0]?.text || "Помилка відповіді." }));
                } catch (e) {
                    setAiInsights(prev => ({ ...prev, [item.id]: "⚠️ AI недоступний." }));
                } finally {
                    setLoadingAi(prev => ({ ...prev, [item.id]: false }));
                }
            };

            return (
                <div className="max-w-7xl mx-auto space-y-6">
                    
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                        <div className="flex items-center gap-4">
                            <img src="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp" alt="Foodline" className="h-10 sm:h-12 w-auto object-contain drop-shadow-sm"/>
                            <div>
                                <h1 className="text-2xl font-extrabold text-slate-800 leading-tight">MRP Import</h1>
                                <p className="text-sm text-slate-500 mt-1 flex items-center gap-1 font-medium">Статус: <span className="text-emerald-600 font-bold">Синхронізовано</span></p>
                            </div>
                        </div>
                        <div className="mt-5 md:mt-0 flex items-center gap-3 bg-slate-100 px-4 py-3 rounded-xl w-full md:w-auto border border-slate-200">
                            <IconCalendar className="text-slate-600 w-5 h-5 shrink-0" />
                            <div className="flex flex-col w-full">
                                <label className="text-[10px] font-bold text-slate-500 uppercase tracking-wider">Дата звіту</label>
                                <input type="date" value={reportDate} onChange={(e) => setReportDate(e.target.value)} className="bg-transparent text-sm font-bold outline-none text-slate-800 w-full cursor-pointer" />
                                <span className="text-[9px] text-slate-400 mt-0.5">{formatDisplayDate(reportDate)}</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex flex-wrap gap-4">
                        <button onClick={() => handleLoadFromGoogle(false)} disabled={isImporting} className="flex items-center gap-2 px-6 py-3 bg-white hover:bg-slate-50 border border-slate-300 text-slate-700 font-bold rounded-xl shadow-sm transition-all flex-1 md:flex-none justify-center disabled:opacity-70">
                            {isImporting ? <IconLoader className="w-5 h-5 animate-spin text-blue-600" /> : <IconRefresh className="w-5 h-5 text-blue-600" />}
                            Синхронізувати з Таблицею
                        </button>
                        <button onClick={handleAddItem} disabled={isImporting} className="flex items-center gap-2 px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-bold rounded-xl shadow-sm transition-all flex-1 md:flex-none justify-center disabled:opacity-70">
                            <IconPlus className="w-5 h-5" />
                            Додати рядок
                        </button>
                    </div>

                    {errorMsg && (
                        <div className="bg-red-50 border border-red-200 text-red-700 px-6 py-4 rounded-xl flex items-start gap-3 shadow-sm">
                            <IconAlert className="w-6 h-6 shrink-0 mt-0.5 text-red-500" />
                            <p className="text-sm font-medium">{errorMsg}</p>
                        </div>
                    )}

                    <div className="space-y-6">
                        {isImporting && items.length === 0 ? (
                            <div className="text-center p-12 bg-white rounded-2xl border border-slate-200 text-slate-400 font-bold">ЗАВАНТАЖЕННЯ...</div>
                        ) : items.map((item) => {
                            const m = calculateMetrics(item);
                            const needsOrder = (m.d1.before !== null && m.d1.before < 0) || (m.d2.before !== null && m.d2.before < 0) || (m.d3.before !== null && m.d3.before < 0) || (parseFloat(m.currentCoverage) < 1 && item.consumption > 0);
                            
                            return (
                                <div key={item.id} className={`bg-white rounded-2xl shadow-sm border overflow-hidden transition-all ${needsOrder ? 'border-red-300 ring-2 ring-red-50' : 'border-slate-200'}`}>
                                    <div className="bg-slate-50 border-b border-slate-200 p-5 relative">
                                        <div className="flex flex-wrap gap-5 items-center pr-12">
                                            <div className="flex-1 min-w-[200px]">
                                                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Номенклатура</label>
                                                <input type="text" value={item.name} onChange={(e) => handleChange(item.id, 'name', e.target.value)} className="w-full font-bold text-slate-900 bg-white border border-slate-300 rounded-lg px-3 py-2 text-lg focus:ring-2 focus:ring-emerald-500 outline-none" />
                                            </div>
                                            <div className="w-28">
                                                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Залишок (шт)</label>
                                                <input type="number" value={item.stock} onChange={(e) => handleChange(item.id, 'stock', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-300 rounded-lg px-3 py-2 text-lg focus:ring-2 focus:ring-emerald-500 outline-none" />
                                            </div>
                                            <div className="w-28">
                                                <label className="block text-[10px] font-bold text-slate-400 uppercase mb-1">Витрата/міс</label>
                                                <input type="number" value={item.consumption} onChange={(e) => handleChange(item.id, 'consumption', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-300 rounded-lg px-3 py-2 text-lg focus:ring-2 focus:ring-emerald-500 outline-none" />
                                            </div>
                                            <div className="w-32 bg-white border border-slate-200 rounded-lg p-2 flex flex-col justify-center items-center shadow-sm">
                                                <span className="text-[10px] text-slate-400 font-bold uppercase mb-0.5">Покриття</span>
                                                <span className={`text-xl font-black ${parseFloat(m.currentCoverage) < 1 ? 'text-red-600' : 'text-emerald-600'}`}>
                                                    {m.currentCoverage} <span className="text-sm font-bold">міс.</span>
                                                </span>
                                            </div>
                                            <button onClick={() => handleAiAnalysis(item, m)} disabled={loadingAi[item.id]} className="bg-purple-600 hover:bg-purple-700 text-white px-4 py-2.5 rounded-lg text-xs font-bold flex gap-2 items-center transition-all shadow-sm disabled:opacity-50 ml-auto">
                                                {loadingAi[item.id] ? <IconLoader className="animate-spin w-4 h-4" /> : <IconSparkles className="w-4 h-4" />}
                                                AI АНАЛІЗ
                                            </button>
                                        </div>
                                        {needsOrder && (
                                            <div className="mt-4 flex items-center gap-2 text-red-700 bg-red-50 border border-red-200 px-4 py-2 rounded-lg inline-flex">
                                                <IconAlert className="w-5 h-5 shrink-0" />
                                                <span className="text-sm font-bold uppercase">Увага! Критичний рівень або дефіцит.</span>
                                            </div>
                                        )}
                                        <button onClick={() => handleRemoveItem(item.id)} className="absolute top-5 right-5 text-slate-400 hover:text-red-500 bg-white p-1.5 rounded-md border border-slate-200 shadow-sm transition-colors">
                                            <IconTrash className="w-4 h-4" />
                                        </button>
                                    </div>

                                    {aiInsights[item.id] && (
                                        <div className="p-5 bg-purple-50 text-sm text-purple-900 border-b border-purple-100 flex items-start gap-4">
                                            <IconInfo className="w-5 h-5 shrink-0 text-purple-600 mt-0.5" />
                                            <div className="whitespace-pre-wrap font-medium leading-relaxed">{aiInsights[item.id]}</div>
                                        </div>
                                    )}

                                    <div className="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-slate-100 bg-white">
                                        <DeliveryItem num={1} m={m.d1} sendDate={item.d1Send} date={item.d1Date} qty={item.d1Qty} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                        <DeliveryItem num={2} m={m.d2} sendDate={item.d2Send} date={item.d2Date} qty={item.d2Qty} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                        <DeliveryItem num={3} m={m.d3} sendDate={item.d3Send} date={item.d3Date} qty={item.d3Qty} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function DeliveryItem({ num, m, sendDate, date, qty, formatNum, handleChange, itemId }) {
            const isDeficit = m.before !== null && m.before < 0;
            
            let transitDays = '-';
            if (sendDate && date) {
                const s = new Date(sendDate);
                const a = new Date(date);
                if (!isNaN(s) && !isNaN(a)) {
                    transitDays = Math.max(0, Math.round((a - s) / (1000 * 60 * 60 * 24)));
                }
            }

            return (
                <div className="p-5 relative hover:bg-slate-50 transition-colors">
                    <div className="flex justify-between items-center mb-4">
                        <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest flex items-center gap-2">
                            <span className="bg-slate-100 text-slate-600 rounded w-6 h-6 flex items-center justify-center text-[10px] font-black shadow-sm border border-slate-200">{num}</span>
                            Доставка
                        </h3>
                    </div>

                    <div className="space-y-4">
                        <div className="flex gap-2">
                            <div className="flex-1">
                                <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Відправка</label>
                                <input type="date" value={sendDate || ''} onChange={e => handleChange(itemId, `d${num}Send`, e.target.value)} className="w-full text-xs font-bold border border-slate-300 rounded px-2 py-1.5 focus:ring-1 focus:ring-blue-500 outline-none" />
                            </div>
                            <div className="flex-1">
                                <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Прибуття</label>
                                <input type="date" value={date || ''} onChange={e => handleChange(itemId, `d${num}Date`, e.target.value)} className="w-full text-xs font-bold border border-slate-300 rounded px-2 py-1.5 focus:ring-1 focus:ring-blue-500 outline-none" />
                            </div>
                        </div>

                        <div>
                            <label className="block text-[9px] font-bold text-slate-400 uppercase mb-1">Кількість (шт)</label>
                            <input type="number" value={qty || ''} onChange={e => handleChange(itemId, `d${num}Qty`, e.target.value)} placeholder="0" className="w-full text-sm font-bold border border-slate-300 rounded px-2 py-1.5 focus:ring-1 focus:ring-blue-500 outline-none text-blue-600" />
                        </div>

                        {sendDate && date && (
                            <div className="text-[10px] font-bold text-slate-500 flex items-center gap-1.5 justify-end">
                                <span className="bg-blue-50 text-blue-600 px-2 py-0.5 rounded border border-blue-100">У дорозі: {transitDays} дн.</span>
                            </div>
                        )}

                        <div className={`p-3 rounded-xl border mt-2 ${isDeficit ? 'bg-red-50 border-red-200 shadow-sm shadow-red-100' : 'bg-white border-slate-200'}`}>
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Залишок до:</span>
                                <span className={`font-black text-sm ${isDeficit ? 'text-red-600' : 'text-slate-800'}`}>
                                    {isDeficit && "⚠️ "}{formatNum(m.before)}
                                </span>
                            </div>
                            <div className="flex justify-between items-center">
                                <span className="text-[10px] font-bold text-slate-500 uppercase tracking-tighter">Нове покриття:</span>
                                <span className={`font-black text-xs px-2 py-0.5 rounded ${parseFloat(m.covStr) < 1 ? 'text-red-700 bg-red-100' : 'text-emerald-700 bg-emerald-100'}`}>
                                    {m.covStr} міс.
                                </span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
