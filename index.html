<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Калькулятор покриття запасів MRP - Foodline</title>
    
    <!-- PWA та іконки (з вашого коду) -->
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp">
    
    <!-- Підключаємо TailwindCSS для стилів -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Підключаємо React та сучасний Babel для роботи коду прямо в браузері -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50 text-gray-800">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Вбудовані іконки
        const IconPlus = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconAlert = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconCalendar = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconSparkles = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
        const IconLoader = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconInfo = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const IconRefresh = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;

        function App() {
            // Встановлюємо початкову дату
            const [reportDate, setReportDate] = useState('2026-03-06');
            const [aiInsights, setAiInsights] = useState({});
            const [loadingAi, setLoadingAi] = useState({});
            const [isImporting, setIsImporting] = useState(true); // Відразу показуємо завантаження
            const [items, setItems] = useState([]);

            // АВТОМАТИЧНЕ ЗАВАНТАЖЕННЯ ПРИ ВІДКРИТТІ СТОРІНКИ
            useEffect(() => {
                handleLoadFromGoogle(true);
            }, []);

            // Допоміжна функція для парсингу CSV з врахуванням лапок
            const parseCSVRow = (str) => {
                let result = [];
                let cur = '';
                let inQuotes = false;
                for (let i = 0; i < str.length; i++) {
                    if (str[i] === '"') {
                        inQuotes = !inQuotes;
                    } else if (str[i] === ',' && !inQuotes) {
                        result.push(cur.trim());
                        cur = '';
                    } else {
                        cur += str[i];
                    }
                }
                result.push(cur.trim());
                return result;
            };

            const formatNum = (val) => {
                if (val === null || val === undefined || isNaN(val)) return '-';
                return Number(val).toLocaleString('uk-UA');
            };

            // Функція завантаження з Google (з параметром isInitialLoad)
            const handleLoadFromGoogle = async (isInitialLoad = false) => {
                setIsImporting(true);
                try {
                    // Оригінальне посилання на Google Sheets
                    const targetUrl = "https://docs.google.com/spreadsheets/d/1ch0Gyc_E2PKGaIbOb5qU-g5gwL920cMSIBuWJa89Ocw/gviz/tq?tqx=out:csv&gid=0";
                    
                    // Масив способів обходу CORS
                    const proxies = [
                        '', // Спочатку пробуємо напряму
                        'https://corsproxy.io/?', // Надійний публічний проксі
                        'https://api.allorigins.win/raw?url=' // Альтернативний проксі
                    ];

                    let csvText = null;
                    
                    // Проходимо по списку проксі, поки один не спрацює
                    for (const proxy of proxies) {
                        try {
                            const fetchUrl = proxy ? proxy + encodeURIComponent(targetUrl) : targetUrl;
                            const response = await fetch(fetchUrl);
                            if (response.ok) {
                                csvText = await response.text();
                                break; 
                            }
                        } catch (e) {
                            console.warn(`Запит через ${proxy || 'прямий лінк'} не вдався. Пробую наступний...`);
                        }
                    }

                    if (!csvText) {
                        throw new Error("Запит блокується браузером. Перевірте доступ до таблиці або вимкніть AdBlock.");
                    }

                    const rows = csvText.split('\n').map(parseCSVRow);
                    const parsedItems = [];
                    
                    // Парсинг даних з таблиці (починаємо з 4-го рядка)
                    for (let i = 3; i < rows.length; i++) {
                        const cols = rows[i];
                        if (!cols || !cols[0] || cols[0].includes('Итого')) continue;
                        
                        const name = cols[0];
                        const stock = parseFloat(cols[1]) || 0;
                        const consumption = parseFloat(cols[2]) || 0;
                        
                        if (!name || isNaN(stock)) continue;

                        const parseDateStr = (dateStr) => {
                            if (!dateStr) return '';
                            if (dateStr.includes('-')) return dateStr;
                            const parts = dateStr.split('.');
                            if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
                            return dateStr;
                        };

                        // Мапінг колонок за новим форматом
                        parsedItems.push({
                            id: Date.now() + i,
                            name: name,
                            stock: stock,
                            consumption: consumption,
                            d1Qty: parseFloat(cols[4]) || 0,
                            d1Date: parseDateStr(cols[6]),
                            d2Qty: parseFloat(cols[11]) || 0,
                            d2Date: parseDateStr(cols[13]),
                            d3Qty: parseFloat(cols[18]) || 0,
                            d3Date: parseDateStr(cols[20]),
                        });
                    }

                    if (parsedItems.length > 0) {
                        setItems(parsedItems);
                        if (!isInitialLoad) alert(`Оновлено! Завантажено ${parsedItems.length} позицій.`);
                    } else {
                        if (!isInitialLoad) alert('Не вдалося знайти позиції у правильному форматі.');
                    }
                } catch (err) {
                    console.error(err);
                    if (!isInitialLoad) alert('Помилка синхронізації: ' + err.message);
                } finally {
                    setIsImporting(false);
                }
            };

            const handleAddItem = () => {
                setItems([
                    {
                        id: Date.now(),
                        name: 'Нова позиція',
                        stock: 0,
                        consumption: 0,
                        d1Qty: 0, d1Date: '',
                        d2Qty: 0, d2Date: '',
                        d3Qty: 0, d3Date: ''
                    },
                    ...items
                ]);
            };

            const handleRemoveItem = (id) => {
                setItems(items.filter(item => item.id !== id));
                const newInsights = { ...aiInsights };
                delete newInsights[id];
                setAiInsights(newInsights);
            };

            const handleChange = (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                if (aiInsights[id]) {
                    const newInsights = { ...aiInsights };
                    delete newInsights[id];
                    setAiInsights(newInsights);
                }
            };

            const calculateMetrics = (item) => {
                const today = new Date(reportDate);
                const stock = Number(item.stock) || 0;
                const consumption = Number(item.consumption) || 0;
                const dailyConsumption = consumption / 30;

                const parseDate = (d) => d ? new Date(d) : null;
                const d1Date = parseDate(item.d1Date);
                const d2Date = parseDate(item.d2Date);
                const d3Date = parseDate(item.d3Date);

                const d1Qty = Number(item.d1Qty) || 0;
                const d2Qty = Number(item.d2Qty) || 0;
                const d3Qty = Number(item.d3Qty) || 0;

                const getDays = (targetDate) => {
                    if (!targetDate) return 0;
                    const diffTime = targetDate - today;
                    return Math.max(0, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
                };

                const days1 = getDays(d1Date);
                const days2 = getDays(d2Date);
                const days3 = getDays(d3Date);

                const before1 = item.d1Date ? stock - (days1 * dailyConsumption) : null;
                const after1 = before1 !== null ? before1 + d1Qty : null;

                let before2 = item.d2Date ? stock - (days2 * dailyConsumption) : null;
                if (before2 !== null && d1Date && d1Date <= d2Date) {
                    before2 += d1Qty;
                }
                const after2 = before2 !== null ? before2 + d2Qty : null;

                let before3 = item.d3Date ? stock - (days3 * dailyConsumption) : null;
                if (before3 !== null && d1Date && d1Date <= d3Date) before3 += d1Qty;
                if (before3 !== null && d2Date && d2Date <= d3Date) before3 += d2Qty;
                const after3 = before3 !== null ? before3 + d3Qty : null;

                const covSafe = (val) => val !== null && consumption > 0 ? (val / consumption).toFixed(1) : '-';

                return {
                    currentCoverage: consumption > 0 ? (stock / consumption).toFixed(1) : '0',
                    d1: { before: before1, after: after1, beforeStr: formatNum(before1), covStr: covSafe(after1) },
                    d2: { before: before2, after: after2, beforeStr: formatNum(before2), covStr: covSafe(after2) },
                    d3: { before: before3, after: after3, beforeStr: formatNum(before3), covStr: covSafe(after3) },
                };
            };

            const fetchWithBackoff = async (payload, maxRetries = 5) => {
                const apiKey = ""; // API ключ
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                let retries = 0;
                const delays = [1000, 2000, 4000, 8000, 16000];

                while (retries <= maxRetries) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);

                        const data = await response.json();
                        const textPart = data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0];
                        return (textPart && textPart.text) ? textPart.text : "Не вдалося згенерувати відповідь.";
                    } catch (error) {
                        if (retries === maxRetries) throw new Error("Перевищено ліміт спроб підключення до ШІ.");
                        await new Promise(res => setTimeout(res, delays[retries]));
                        retries++;
                    }
                }
            };

            const handleAiAnalysis = async (item, metrics) => {
                setLoadingAi(prev => ({ ...prev, [item.id]: true }));
                
                const systemPrompt = `Ти - досвідчений експерт з ланцюгів постачання (Supply Chain Manager) та аналітик запасів. 
                Твоє завдання: коротко, професійно та структуровано проаналізувати ситуацію по конкретній позиції сировини (SKU).
                Оціни ризики розриву ланцюга (out-of-stock) або надмірного замороження капіталу (overstock).
                Якщо бачиш, що дата поставки не за планом (наприклад, вже минула) або перед приходом якоїсь поставки залишок стає від'ємним (дефіцит) — обов'язково, чітко і прямо порекомендуй ЗРОБИТИ НОВЕ ЗАМОВЛЕННЯ або переглянути логістику.
                Дай 1-2 конкретні рекомендації. Відповідай українською мовою, використовуй марковані списки для зручності.`;

                const userQuery = `
                Проаналізуй позицію: "${item.name}"
                Сьогоднішня дата звіту: ${reportDate}
                
                ПОТОЧНИЙ СТАН:
                - Залишок зараз: ${item.stock} шт.
                - Швидкість витрати: ${item.consumption} шт/міс.
                - Поточне покриття: ${metrics.currentCoverage} міс.
                
                ПЛАНОВІ ПОСТАВКИ:
                1. №1: ${item.d1Qty || 0} шт. (Дата: ${item.d1Date || 'Не заплановано'}). Очікуваний залишок перед нею: ${metrics.d1.before !== null ? Math.round(metrics.d1.before) : 'N/A'} шт.
                2. №2: ${item.d2Qty || 0} шт. (Дата: ${item.d2Date || 'Не заплановано'}). Очікуваний залишок перед нею: ${metrics.d2.before !== null ? Math.round(metrics.d2.before) : 'N/A'} шт.
                3. №3: ${item.d3Qty || 0} шт. (Дата: ${item.d3Date || 'Не заплановано'}). Очікуваний залишок перед нею: ${metrics.d3.before !== null ? Math.round(metrics.d3.before) : 'N/A'} шт.
                `;

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                try {
                    const resultText = await fetchWithBackoff(payload);
                    setAiInsights(prev => ({ ...prev, [item.id]: resultText }));
                } catch (error) {
                    setAiInsights(prev => ({ 
                        ...prev, 
                        [item.id]: "⚠️ Помилка з'єднання з ШІ. (Примітка: При запуску з власного серверу потрібен налаштований API ключ)." 
                    }));
                } finally {
                    setLoadingAi(prev => ({ ...prev, [item.id]: false }));
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 p-4 md:p-8 font-sans">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        {/* Шапка з ЛОГОТИПОМ компанії */}
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div className="flex items-center gap-4">
                                {/* Логотип */}
                                <div className="w-14 h-14 rounded-xl overflow-hidden bg-white border border-gray-100 shadow-sm flex items-center justify-center shrink-0">
                                    <img 
                                        src="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp" 
                                        alt="Foodline Logo" 
                                        className="w-full h-full object-cover"
                                    />
                                </div>
                                <div>
                                    <h1 className="text-2xl font-bold text-gray-900 leading-tight">Система управління запасами</h1>
                                    <p className="text-sm text-gray-500 mt-1 flex items-center gap-1">
                                        <IconSparkles className="w-4 h-4 text-purple-500" />
                                        Аналітика MRP з підтримкою AI
                                    </p>
                                </div>
                            </div>
                            
                            <div className="mt-5 md:mt-0 flex items-center gap-3 bg-blue-50 px-4 py-3 rounded-xl border border-blue-100 w-full md:w-auto">
                                <IconCalendar className="text-blue-600 w-5 h-5 shrink-0" />
                                <div className="flex flex-col w-full">
                                    <label className="text-xs font-semibold text-blue-800 uppercase tracking-wide">Дата звіту (сьогодні)</label>
                                    <input 
                                        type="date" 
                                        value={reportDate}
                                        onChange={(e) => setReportDate(e.target.value)}
                                        className="bg-transparent text-sm font-medium outline-none text-blue-900 w-full"
                                    />
                                </div>
                            </div>
                        </div>

                        {/* Панель кнопок */}
                        <div className="flex flex-wrap gap-4 mb-4">
                            <button 
                                onClick={() => handleLoadFromGoogle(false)}
                                disabled={isImporting}
                                className="flex items-center gap-2 px-6 py-3 bg-white hover:bg-gray-50 border border-gray-200 text-gray-700 font-medium rounded-xl shadow-sm transition-all flex-1 md:flex-none justify-center"
                            >
                                {isImporting ? <IconLoader className="w-5 h-5 animate-spin text-blue-600" /> : <IconRefresh className="w-5 h-5 text-blue-600" />}
                                {isImporting ? 'Оновлення даних...' : 'Синхронізувати з Таблицею'}
                            </button>
                            <button 
                                onClick={handleAddItem}
                                className="flex items-center gap-2 px-6 py-3 bg-emerald-500 hover:bg-emerald-600 text-white font-medium rounded-xl shadow-sm transition-all flex-1 md:flex-none justify-center"
                            >
                                <IconPlus className="w-5 h-5" />
                                Додати вручну
                            </button>
                        </div>

                        {/* Індикатор завантаження або Список позицій */}
                        {isImporting && items.length === 0 ? (
                            <div className="flex flex-col items-center justify-center p-12 bg-white rounded-xl border border-gray-200 shadow-sm">
                                <IconLoader className="w-10 h-10 animate-spin text-emerald-500 mb-4" />
                                <p className="text-gray-600 font-medium text-lg">Завантаження бази даних з Google Sheets...</p>
                                <p className="text-sm text-gray-400 mt-2 text-center max-w-md">Це може зайняти кілька секунд в залежності від розміру таблиці.</p>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                {items.map((item) => {
                                    const metrics = calculateMetrics(item);
                                    const isAnalyzing = loadingAi[item.id];
                                    const hasInsight = aiInsights[item.id];
                                    
                                    const needsOrder = (metrics.d1.before !== null && metrics.d1.before < 0) || 
                                                    (metrics.d2.before !== null && metrics.d2.before < 0) || 
                                                    (metrics.d3.before !== null && metrics.d3.before < 0) ||
                                                    (parseFloat(metrics.currentCoverage) < 1 && !item.d1Date && !item.d2Date && !item.d3Date);
                                    
                                    return (
                                        <div key={item.id} className={`bg-white rounded-xl shadow-sm border overflow-hidden transition-all ${needsOrder ? 'border-red-300 ring-1 ring-red-100' : 'border-gray-200 hover:border-gray-300'}`}>
                                            <div className="bg-slate-50 border-b border-gray-200 p-5 relative">
                                                <div className="flex flex-wrap gap-5 items-start pr-12">
                                                    <div className="flex-1 min-w-[250px]">
                                                        <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">SKU / Назва сировини</label>
                                                        <input 
                                                            type="text" 
                                                            value={item.name}
                                                            onChange={(e) => handleChange(item.id, 'name', e.target.value)}
                                                            className="w-full font-bold text-gray-900 bg-white border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 focus:border-emerald-500 outline-none transition-shadow"
                                                        />
                                                    </div>
                                                    <div className="w-32">
                                                        <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Залишок</label>
                                                        <div className="relative">
                                                            <input 
                                                                type="number" 
                                                                value={item.stock}
                                                                onChange={(e) => handleChange(item.id, 'stock', e.target.value)}
                                                                className="w-full bg-white border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 outline-none text-transparent transition-shadow"
                                                            />
                                                            <div className="absolute inset-0 px-4 py-2.5 pointer-events-none font-medium text-gray-900">
                                                                {formatNum(item.stock)}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="w-32">
                                                        <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Витрата/міс</label>
                                                        <div className="relative">
                                                            <input 
                                                                type="number" 
                                                                value={item.consumption}
                                                                onChange={(e) => handleChange(item.id, 'consumption', e.target.value)}
                                                                className="w-full bg-white border border-gray-300 rounded-lg px-4 py-2.5 focus:ring-2 focus:ring-emerald-500 outline-none text-transparent transition-shadow"
                                                            />
                                                            <div className="absolute inset-0 px-4 py-2.5 pointer-events-none font-medium text-gray-900">
                                                                {formatNum(item.consumption)}
                                                            </div>
                                                        </div>
                                                    </div>
                                                    <div className="w-36 bg-emerald-50 border border-emerald-100 rounded-lg p-2 flex flex-col justify-center items-center shadow-inner">
                                                        <span className="text-[10px] text-emerald-600 font-bold uppercase tracking-wider mb-0.5">Покриття зараз</span>
                                                        <span className="text-xl font-black text-emerald-700">{metrics.currentCoverage} <span className="text-sm font-medium">міс.</span></span>
                                                    </div>

                                                    <button
                                                        onClick={() => handleAiAnalysis(item, metrics)}
                                                        disabled={isAnalyzing}
                                                        className="ml-auto mt-2 flex items-center gap-2 px-5 py-2.5 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white rounded-lg font-medium shadow-md hover:shadow-lg transition-all disabled:opacity-70 disabled:shadow-none"
                                                    >
                                                        {isAnalyzing ? <IconLoader className="w-4 h-4 animate-spin" /> : <IconSparkles className="w-4 h-4" />}
                                                        <span className="text-sm">{isAnalyzing ? 'Аналізую...' : 'Аналіз ШІ'}</span>
                                                    </button>
                                                </div>
                                                
                                                {needsOrder && (
                                                    <div className="mt-4 flex items-center gap-2 text-red-700 bg-red-50 border border-red-200 px-4 py-2 rounded-lg inline-flex shadow-sm">
                                                        <IconAlert className="w-5 h-5 shrink-0" />
                                                        <span className="text-sm font-bold">Критичний рівень! Рекомендовано зробити нове замовлення.</span>
                                                    </div>
                                                )}

                                                <button 
                                                    onClick={() => handleRemoveItem(item.id)}
                                                    className="absolute top-5 right-5 text-gray-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded-md transition-colors"
                                                    title="Видалити позицію"
                                                >
                                                    <IconTrash className="w-5 h-5" />
                                                </button>
                                            </div>

                                            {hasInsight && (
                                                <div className="bg-gradient-to-br from-indigo-50 to-purple-50 border-b border-indigo-100/50 p-5">
                                                    <div className="flex gap-4">
                                                        <div className="mt-0.5 bg-white p-1.5 rounded-full shadow-sm">
                                                            <IconInfo className="w-5 h-5 text-indigo-600" />
                                                        </div>
                                                        <div className="flex-1">
                                                            <h4 className="text-sm font-bold text-indigo-900 mb-2 uppercase tracking-wide">Рішення експерта:</h4>
                                                            <div className="text-sm text-indigo-900/80 space-y-2 whitespace-pre-wrap leading-relaxed font-medium">
                                                                {aiInsights[item.id]}
                                                            </div>
                                                        </div>
                                                    </div>
                                                </div>
                                            )}

                                            <div className="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-gray-100 bg-white">
                                                <DeliveryBlock num={1} item={item} metrics={metrics.d1} handleChange={handleChange} formatNum={formatNum} />
                                                <DeliveryBlock num={2} item={item} metrics={metrics.d2} handleChange={handleChange} formatNum={formatNum} />
                                                <DeliveryBlock num={3} item={item} metrics={metrics.d3} handleChange={handleChange} formatNum={formatNum} />
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function DeliveryBlock({ num, item, metrics, handleChange, formatNum }) {
            const isDeficit = metrics.before !== null && metrics.before < 0;
            const hasDate = !!item[`d${num}Date`];

            return (
                <div className="p-5 relative hover:bg-slate-50/50 transition-colors">
                    <h3 className="text-sm font-bold text-gray-800 mb-4 flex items-center gap-2">
                        <span className="bg-blue-100 text-blue-700 rounded-lg w-7 h-7 flex items-center justify-center text-xs font-black shadow-sm">
                            {num}
                        </span>
                        Транзит / Поставка {num}
                    </h3>
                    
                    <div className="space-y-4">
                        <div className="flex gap-4">
                            <div className="flex-1">
                                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Прибуття</label>
                                <input 
                                    type="date" 
                                    value={item[`d${num}Date`]}
                                    onChange={(e) => handleChange(item.id, `d${num}Date`, e.target.value)}
                                    className="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none transition-shadow"
                                />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-semibold text-gray-500 uppercase tracking-wide mb-1.5">Об'єм (шт)</label>
                                <div className="relative">
                                    <input 
                                        type="number" 
                                        value={item[`d${num}Qty`]}
                                        onChange={(e) => handleChange(item.id, `d${num}Qty`, e.target.value)}
                                        className="w-full text-sm border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none text-transparent transition-shadow"
                                    />
                                    <div className="absolute inset-0 px-3 py-2 pointer-events-none text-sm text-gray-900 font-medium">
                                        {formatNum(item[`d${num}Qty`])}
                                    </div>
                                </div>
                            </div>
                        </div>

                        {hasDate && (
                            <div className={`p-3.5 rounded-xl border ${isDeficit ? 'bg-red-50/80 border-red-200' : 'bg-slate-50 border-gray-200'}`}>
                                <div className="flex justify-between items-center mb-1.5">
                                    <span className="text-xs font-medium text-gray-500">Залишок до:</span>
                                    <span className={`font-bold text-sm flex items-center gap-1 ${isDeficit ? 'text-red-600' : 'text-gray-800'}`}>
                                        {isDeficit && <IconAlert className="w-3.5 h-3.5" />}
                                        {metrics.beforeStr}
                                    </span>
                                </div>
                                
                                <div className="flex justify-between items-center mb-2">
                                    <span className="text-xs font-medium text-gray-500">Залишок після:</span>
                                    <span className="font-bold text-sm text-blue-700">
                                        {formatNum(metrics.after)}
                                    </span>
                                </div>
                                
                                <div className="flex justify-between items-center pt-2.5 mt-1 border-t border-gray-200/80">
                                    <span className="text-[11px] font-bold text-gray-500 uppercase tracking-wider">Нове покриття:</span>
                                    <span className={`font-bold text-xs px-2.5 py-1 rounded-md shadow-sm ${parseFloat(metrics.covStr) < 1 ? 'text-red-700 bg-red-100' : 'text-emerald-700 bg-emerald-100'}`}>
                                        {metrics.covStr} міс.
                                    </span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
