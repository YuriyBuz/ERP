  <!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор покриття запасів MRP</title>
    
    <!-- Підключаємо TailwindCSS для стилів -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Підключаємо React та сучасний Babel для роботи коду прямо в браузері -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-gray-50">
    <!-- Тут буде намальований наш додаток -->
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // Вбудовані іконки (замість сторонньої бібліотеки lucide-react)
        const IconPlus = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconAlert = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconPackage = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="16.5" y1="9.4" x2="7.5" y2="4.21"></line><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg>;
        const IconCalendar = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>;
        const IconSparkles = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
        const IconLoader = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconInfo = ({className="w-5 h-5"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;

        function App() {
            const [reportDate, setReportDate] = useState('2026-03-06');
            const [aiInsights, setAiInsights] = useState({});
            const [loadingAi, setLoadingAi] = useState({});

            const [items, setItems] = useState([
                {
                    id: 1,
                    name: 'Пляшка 0,180 мл Стекло (Китай)',
                    stock: 54709,
                    consumption: 9800,
                    d1Qty: 120000,
                    d1Date: '2026-06-28',
                    d2Qty: 0,
                    d2Date: '2026-06-13',
                    d3Qty: 0,
                    d3Date: '2025-03-30',
                },
                {
                    id: 2,
                    name: 'Колпачек пластик Китай',
                    stock: 54293,
                    consumption: 9800,
                    d1Qty: 25000,
                    d1Date: '2026-01-02',
                    d2Qty: 30000,
                    d2Date: '2026-04-15', 
                    d3Qty: 0,
                    d3Date: '', 
                }
            ]);

            const handleAddItem = () => {
                setItems([
                    ...items,
                    {
                        id: Date.now(),
                        name: 'Нова позиція',
                        stock: 0,
                        consumption: 0,
                        d1Qty: 0, d1Date: '',
                        d2Qty: 0, d2Date: '',
                        d3Qty: 0, d3Date: ''
                    }
                ]);
            };

            const handleRemoveItem = (id) => {
                setItems(items.filter(item => item.id !== id));
                const newInsights = { ...aiInsights };
                delete newInsights[id];
                setAiInsights(newInsights);
            };

            const handleChange = (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                if (aiInsights[id]) {
                    const newInsights = { ...aiInsights };
                    delete newInsights[id];
                    setAiInsights(newInsights);
                }
            };

            const calculateMetrics = (item) => {
                const today = new Date(reportDate);
                const stock = Number(item.stock) || 0;
                const consumption = Number(item.consumption) || 0;
                const dailyConsumption = consumption / 30;

                const parseDate = (d) => d ? new Date(d) : null;
                const d1Date = parseDate(item.d1Date);
                const d2Date = parseDate(item.d2Date);
                const d3Date = parseDate(item.d3Date);

                const d1Qty = Number(item.d1Qty) || 0;
                const d2Qty = Number(item.d2Qty) || 0;
                const d3Qty = Number(item.d3Qty) || 0;

                const getDays = (targetDate) => {
                    if (!targetDate) return 0;
                    const diffTime = targetDate - today;
                    return Math.max(0, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
                };

                const days1 = getDays(d1Date);
                const days2 = getDays(d2Date);
                const days3 = getDays(d3Date);

                const before1 = item.d1Date ? stock - (days1 * dailyConsumption) : null;
                const after1 = before1 !== null ? before1 + d1Qty : null;

                let before2 = item.d2Date ? stock - (days2 * dailyConsumption) : null;
                if (before2 !== null && d1Date && d1Date <= d2Date) {
                    before2 += d1Qty;
                }
                const after2 = before2 !== null ? before2 + d2Qty : null;

                let before3 = item.d3Date ? stock - (days3 * dailyConsumption) : null;
                if (before3 !== null && d1Date && d1Date <= d3Date) before3 += d1Qty;
                if (before3 !== null && d2Date && d2Date <= d3Date) before3 += d2Qty;
                const after3 = before3 !== null ? before3 + d3Qty : null;

                const formatSafe = (val) => val !== null ? Math.round(val).toLocaleString('uk-UA') : '-';
                const covSafe = (val) => val !== null && consumption > 0 ? (val / consumption).toFixed(1) : '-';

                return {
                    currentCoverage: consumption > 0 ? (stock / consumption).toFixed(1) : '0',
                    d1: { before: before1, after: after1, beforeStr: formatSafe(before1), covStr: covSafe(after1) },
                    d2: { before: before2, after: after2, beforeStr: formatSafe(before2), covStr: covSafe(after2) },
                    d3: { before: before3, after: after3, beforeStr: formatSafe(before3), covStr: covSafe(after3) },
                };
            };

            const fetchWithBackoff = async (payload, maxRetries = 5) => {
                const apiKey = ""; // API ключ
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                let retries = 0;
                const delays = [1000, 2000, 4000, 8000, 16000];

                while (retries <= maxRetries) {
                    try {
                        const response = await fetch(url, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(payload)
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP error! status: ${response.status}`);
                        }

                        const data = await response.json();
                        // Замість оператора опціонального ланцюжка (?.) використовуємо безпечну перевірку
                        const textPart = data.candidates && 
                                         data.candidates[0] && 
                                         data.candidates[0].content && 
                                         data.candidates[0].content.parts && 
                                         data.candidates[0].content.parts[0];
                                         
                        return (textPart && textPart.text) ? textPart.text : "Не вдалося згенерувати відповідь.";
                    } catch (error) {
                        if (retries === maxRetries) {
                            throw new Error("Перевищено ліміт спроб підключення до ШІ.");
                        }
                        await new Promise(res => setTimeout(res, delays[retries]));
                        retries++;
                    }
                }
            };

            const handleAiAnalysis = async (item, metrics) => {
                setLoadingAi(prev => ({ ...prev, [item.id]: true }));
                
                const systemPrompt = `Ти - досвідчений експерт з ланцюгів постачання (Supply Chain Manager) та аналітик запасів. 
                Твоє завдання: коротко, професійно та структуровано проаналізувати ситуацію по конкретній позиції сировини (SKU).
                Оціни ризики розриву ланцюга (out-of-stock) або надмірного замороження капіталу (overstock).
                Дай 1-2 конкретні рекомендації. Відповідай українською мовою, використовуй марковані списки для зручності.`;

                const userQuery = `
                Проаналізуй позицію: "${item.name}"
                Сьогоднішня дата звіту: ${reportDate}
                
                ПОТОЧНИЙ СТАН:
                - Залишок зараз: ${item.stock} шт.
                - Швидкість витрати: ${item.consumption} шт/міс.
                - Поточне покриття (на скільки вистачить без поставок): ${metrics.currentCoverage} міс.
                
                ПЛАНОВІ ПОСТАВКИ:
                1. Поставка №1: ${item.d1Qty || 0} шт. (Дата: ${item.d1Date || 'Не заплановано'}). Очікуваний залишок перед нею: ${metrics.d1.before !== null ? Math.round(metrics.d1.before) : 'N/A'} шт.
                2. Поставка №2: ${item.d2Qty || 0} шт. (Дата: ${item.d2Date || 'Не заплановано'}). Очікуваний залишок перед нею: ${metrics.d2.before !== null ? Math.round(metrics.d2.before) : 'N/A'} шт.
                3. Поставка №3: ${item.d3Qty || 0} шт. (Дата: ${item.d3Date || 'Не заплановано'}). Очікуваний залишок перед нею: ${metrics.d3.before !== null ? Math.round(metrics.d3.before) : 'N/A'} шт.
                
                Якщо залишок перед поставкою від'ємний - це означає зупинку лінії.
                Якщо дата поставки в минулому - вкажи на помилку в даних або затримку логістики.
                `;

                const payload = {
                    contents: [{ parts: [{ text: userQuery }] }],
                    systemInstruction: { parts: [{ text: systemPrompt }] }
                };

                try {
                    const resultText = await fetchWithBackoff(payload);
                    setAiInsights(prev => ({ ...prev, [item.id]: resultText }));
                } catch (error) {
                    setAiInsights(prev => ({ 
                        ...prev, 
                        [item.id]: "⚠️ Помилка з'єднання з ШІ. (Примітка: При запуску з власного серверу потрібен налаштований API ключ)." 
                    }));
                } finally {
                    setLoadingAi(prev => ({ ...prev, [item.id]: false }));
                }
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 p-4 md:p-8 font-sans">
                    <div className="max-w-7xl mx-auto space-y-6">
                        
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center bg-white p-6 rounded-xl shadow-sm border border-gray-100">
                            <div>
                                <h1 className="text-2xl font-bold text-gray-900 flex items-center gap-2">
                                    <IconPackage className="text-blue-600 w-6 h-6" />
                                    Калькулятор покриття запасів MRP
                                </h1>
                                <p className="text-sm text-gray-500 mt-1 flex items-center gap-1">
                                    <IconSparkles className="w-4 h-4 text-purple-500" />
                                    Інтегровано AI-оцінку Supply Chain
                                </p>
                            </div>
                            <div className="mt-4 md:mt-0 flex items-center gap-3 bg-blue-50 px-4 py-2 rounded-lg border border-blue-100">
                                <IconCalendar className="text-blue-600 w-5 h-5" />
                                <div className="flex flex-col">
                                    <label className="text-xs font-semibold text-blue-800 uppercase">Дата звіту (сьогодні)</label>
                                    <input 
                                        type="date" 
                                        value={reportDate}
                                        onChange={(e) => setReportDate(e.target.value)}
                                        className="bg-transparent text-sm font-medium outline-none text-blue-900"
                                    />
                                </div>
                            </div>
                        </div>

                        <div className="space-y-6">
                            {items.map((item) => {
                                const metrics = calculateMetrics(item);
                                const isAnalyzing = loadingAi[item.id];
                                const hasInsight = aiInsights[item.id];
                                
                                return (
                                    <div key={item.id} className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden transition-all">
                                        <div className="bg-slate-50 border-b border-gray-200 p-4 relative">
                                            <div className="flex flex-wrap gap-4 items-end pr-10">
                                                <div className="flex-1 min-w-[200px]">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">SKU / Назва сировини</label>
                                                    <input 
                                                        type="text" 
                                                        value={item.name}
                                                        onChange={(e) => handleChange(item.id, 'name', e.target.value)}
                                                        className="w-full font-semibold text-gray-900 bg-white border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                                <div className="w-28">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Залишок</label>
                                                    <input 
                                                        type="number" 
                                                        value={item.stock}
                                                        onChange={(e) => handleChange(item.id, 'stock', e.target.value)}
                                                        className="w-full bg-white border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                                <div className="w-28">
                                                    <label className="block text-xs font-medium text-gray-500 mb-1">Витрата/міс</label>
                                                    <input 
                                                        type="number" 
                                                        value={item.consumption}
                                                        onChange={(e) => handleChange(item.id, 'consumption', e.target.value)}
                                                        className="w-full bg-white border border-gray-300 rounded-md px-3 py-2 focus:ring-2 focus:ring-blue-500 outline-none"
                                                    />
                                                </div>
                                                <div className="w-32 bg-green-50 border border-green-200 rounded-md p-2 flex flex-col justify-center items-center">
                                                    <span className="text-xs text-green-700 font-medium">Покриття зараз</span>
                                                    <span className="text-lg font-bold text-green-800">{metrics.currentCoverage} міс.</span>
                                                </div>

                                                <button
                                                    onClick={() => handleAiAnalysis(item, metrics)}
                                                    disabled={isAnalyzing}
                                                    className="ml-auto flex items-center gap-2 px-4 py-2 bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-700 hover:to-indigo-700 text-white rounded-lg font-medium shadow-sm transition-all disabled:opacity-70"
                                                >
                                                    {isAnalyzing ? <IconLoader className="w-4 h-4 animate-spin" /> : <IconSparkles className="w-4 h-4" />}
                                                    <span className="text-sm">{isAnalyzing ? 'Аналізую...' : 'Аналіз ШІ'}</span>
                                                </button>
                                            </div>

                                            <button 
                                                onClick={() => handleRemoveItem(item.id)}
                                                className="absolute top-4 right-4 text-gray-400 hover:text-red-500 transition-colors"
                                                title="Видалити позицію"
                                            >
                                                <IconTrash className="w-5 h-5" />
                                            </button>
                                        </div>

                                        {hasInsight && (
                                            <div className="bg-indigo-50 border-b border-indigo-100 p-4">
                                                <div className="flex gap-3">
                                                    <div className="mt-0.5">
                                                        <IconInfo className="w-5 h-5 text-indigo-600" />
                                                    </div>
                                                    <div className="flex-1">
                                                        <h4 className="text-sm font-bold text-indigo-900 mb-2">Оцінка експерта:</h4>
                                                        <div className="text-sm text-indigo-800 space-y-2 whitespace-pre-wrap leading-relaxed">
                                                            {aiInsights[item.id]}
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        )}

                                        <div className="grid grid-cols-1 md:grid-cols-3 divide-y md:divide-y-0 md:divide-x divide-gray-100">
                                            <DeliveryBlock num={1} item={item} metrics={metrics.d1} handleChange={handleChange} />
                                            <DeliveryBlock num={2} item={item} metrics={metrics.d2} handleChange={handleChange} />
                                            <DeliveryBlock num={3} item={item} metrics={metrics.d3} handleChange={handleChange} />
                                        </div>
                                    </div>
                                );
                            })}
                        </div>

                        <button 
                            onClick={handleAddItem}
                            className="flex items-center gap-2 px-5 py-3 bg-blue-600 hover:bg-blue-700 text-white font-medium rounded-xl shadow-sm transition-colors w-full md:w-auto justify-center"
                        >
                            <IconPlus className="w-5 h-5" />
                            Додати позицію
                        </button>

                    </div>
                </div>
            );
        }

        function DeliveryBlock({ num, item, metrics, handleChange }) {
            const isDeficit = metrics.before !== null && metrics.before < 0;
            const hasDate = !!item[`d${num}Date`];

            return (
                <div className="p-4 bg-white relative hover:bg-gray-50/50 transition-colors">
                    <h3 className="text-sm font-bold text-gray-700 mb-4 flex items-center gap-2">
                        <span className="bg-gray-200 text-gray-700 rounded-full w-6 h-6 flex items-center justify-center text-xs">
                            {num}
                        </span>
                        Поставка №{num}
                    </h3>
                    
                    <div className="space-y-3">
                        <div className="flex gap-3">
                            <div className="flex-1">
                                <label className="block text-xs font-medium text-gray-500 mb-1">Дата прибуття</label>
                                <input 
                                    type="date" 
                                    value={item[`d${num}Date`]}
                                    onChange={(e) => handleChange(item.id, `d${num}Date`, e.target.value)}
                                    className="w-full text-sm border border-gray-300 rounded-md px-2 py-1.5 focus:ring-1 focus:ring-blue-500 outline-none"
                                />
                            </div>
                            <div className="flex-1">
                                <label className="block text-xs font-medium text-gray-500 mb-1">Кількість (шт)</label>
                                <input 
                                    type="number" 
                                    value={item[`d${num}Qty`]}
                                    onChange={(e) => handleChange(item.id, `d${num}Qty`, e.target.value)}
                                    className="w-full text-sm border border-gray-300 rounded-md px-2 py-1.5 focus:ring-1 focus:ring-blue-500 outline-none"
                                />
                            </div>
                        </div>

                        {hasDate && (
                            <div className={`mt-4 p-3 rounded-lg border ${isDeficit ? 'bg-red-50 border-red-200' : 'bg-gray-50 border-gray-200'}`}>
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs text-gray-600">Залишок перед приходом:</span>
                                    <span className={`font-bold text-sm flex items-center gap-1 ${isDeficit ? 'text-red-600' : 'text-gray-800'}`}>
                                        {isDeficit && <IconAlert className="w-3.5 h-3.5" />}
                                        {metrics.beforeStr}
                                    </span>
                                </div>
                                
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs text-gray-600">Залишок після:</span>
                                    <span className="font-bold text-sm text-blue-700">
                                        {metrics.after !== null ? Math.round(metrics.after).toLocaleString('uk-UA') : '-'}
                                    </span>
                                </div>
                                
                                <div className="flex justify-between items-center pt-2 mt-2 border-t border-gray-200/60">
                                    <span className="text-xs font-medium text-gray-600">Нове покриття:</span>
                                    <span className="font-bold text-sm text-green-700 bg-green-100 px-2 py-0.5 rounded">
                                        {metrics.covStr} міс.
                                    </span>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        // Рендер додатку (React 18)
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
