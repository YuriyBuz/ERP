<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MRP Import - Foodline</title>
    
    <!-- PWA та іконки -->
    <meta name="theme-color" content="#10b981">
    <link rel="apple-touch-icon" href="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp">
    
    <!-- Підключаємо TailwindCSS для стилів -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Підключаємо React та Babel -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Кастомний скролбар для зручності горизонтальної прокрутки */
        ::-webkit-scrollbar { height: 8px; width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        
        /* Прибираємо стрілки у числових полях */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        
        /* Ущільнюємо стандартні іконки календаря для дати */
        input[type="date"]::-webkit-calendar-picker-indicator { margin-left: -2px; padding: 0px; cursor: pointer; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans pb-20">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ІКОНКИ ---
        const IconPlus = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
        const IconTrash = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>;
        const IconAlert = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>;
        const IconSparkles = ({className="w-3 h-3"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"></path></svg>;
        const IconLoader = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><line x1="12" y1="2" x2="12" y2="6"></line><line x1="12" y1="18" x2="12" y2="22"></line><line x1="4.93" y1="4.93" x2="7.76" y2="7.76"></line><line x1="16.24" y1="16.24" x2="19.07" y2="19.07"></line><line x1="2" y1="12" x2="6" y2="12"></line><line x1="18" y1="12" x2="22" y2="12"></line><line x1="4.93" y1="19.07" x2="7.76" y2="16.24"></line><line x1="16.24" y1="7.76" x2="19.07" y2="4.93"></line></svg>;
        const IconRefresh = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 0 1 15-6.7L21 8"></path><path d="M3 22v-6h6"></path><path d="M21 12a9 9 0 0 1-15 6.7L3 16"></path></svg>;
        const IconInfo = ({className="w-4 h-4"}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;

        function App() {
            // Сьогоднішня дата для розрахунків
            const reportDate = new Date().toISOString().split('T')[0]; 
            
            const [items, setItems] = useState([]);
            const [isImporting, setIsImporting] = useState(true);
            const [errorMsg, setErrorMsg] = useState("");
            const [aiInsights, setAiInsights] = useState({});
            const [loadingAi, setLoadingAi] = useState({});
            const [lastUpdated, setLastUpdated] = useState("Оновлюється...");

            useEffect(() => {
                handleLoadFromGoogle(true);
            }, []);

            const parseNumberSafe = (val) => {
                if (!val) return 0;
                const cleaned = String(val).replace(/[\s\u00A0]/g, '').replace(',', '.').replace(/['"]/g, '');
                const num = parseFloat(cleaned);
                return isNaN(num) ? 0 : num;
            };

            const parseDateStr = (dateStr) => {
                if (!dateStr) return '';
                let d = String(dateStr).replace(/['"]/g, '').trim();
                if (!d || d === '-') return '';
                
                if (d.includes('.')) {
                    const parts = d.split('.');
                    if (parts.length === 3) {
                        const day = parts[0].padStart(2, '0');
                        const month = parts[1].padStart(2, '0');
                        let year = parts[2];
                        if (year.length === 2) year = '20' + year;
                        return `${year}-${month}-${day}`; 
                    }
                }
                return d;
            };

            const formatNum = (val) => {
                if (val === null || val === undefined || isNaN(val) || val === '') return '-';
                return Math.round(val).toLocaleString('uk-UA');
            };

            const handleLoadFromGoogle = (isInitialLoad = false) => {
                setIsImporting(true);
                setErrorMsg("");
                const targetUrl = "https://script.google.com/macros/s/AKfycbyMuK5Fh2YcsnutoqGq8L9W6yDg9rAkXM1kk7WkBHohFuBm5-9P8uNZhlR7x7wbOp3b/exec";

                fetch(targetUrl)
                    .then(response => response.json())
                    .then(result => {
                        if (result.error) throw new Error(result.error);
                        const rows = result.data || result;
                        const parsedItems = [];
                        
                        for (let i = 2; i < rows.length; i++) {
                            const row = rows[i];
                            if (!row || !row[0]) continue;
                            
                            const name = String(row[0]).trim();
                            if (name === '' || name.toLowerCase().includes('шт') || name.toLowerCase().includes('мес') || name.toLowerCase().includes('итого')) continue;

                            parsedItems.push({
                                id: Date.now() + i,
                                name: name,
                                stock: parseNumberSafe(row[1]),       
                                consumption: parseNumberSafe(row[2]), 
                                d1Send: parseDateStr(row[3]),
                                d1Date: parseDateStr(row[4]),        
                                d1Qty: parseNumberSafe(row[5]),       
                                d2Send: parseDateStr(row[7]),
                                d2Date: parseDateStr(row[8]),        
                                d2Qty: parseNumberSafe(row[9]),       
                                d3Send: parseDateStr(row[11]),
                                d3Date: parseDateStr(row[12]),        
                                d3Qty: parseNumberSafe(row[13]),
                            });
                        }

                        setItems(parsedItems);
                        
                        // Формат дати: 05.04.2026 12:23
                        const now = new Date();
                        const dd = String(now.getDate()).padStart(2, '0');
                        const mm = String(now.getMonth() + 1).padStart(2, '0');
                        const yyyy = now.getFullYear();
                        const hh = String(now.getHours()).padStart(2, '0');
                        const min = String(now.getMinutes()).padStart(2, '0');
                        setLastUpdated(`${dd}.${mm}.${yyyy} ${hh}:${min}`);
                        
                        setIsImporting(false);
                    })
                    .catch(err => {
                        setErrorMsg("Помилка підключення: " + err.message);
                        setIsImporting(false);
                    });
            };

            const calculateMetrics = (item) => {
                const today = new Date(reportDate);
                today.setHours(0, 0, 0, 0);
                const S0 = Number(item.stock) || 0;
                const C_monthly = Number(item.consumption) || 0;
                const C_daily = C_monthly / 30;

                const deliveries = [
                    { id: 1, qty: Number(item.d1Qty) || 0, dateStr: item.d1Date },
                    { id: 2, qty: Number(item.d2Qty) || 0, dateStr: item.d2Date },
                    { id: 3, qty: Number(item.d3Qty) || 0, dateStr: item.d3Date },
                ].map(d => {
                    const dateObj = d.dateStr ? new Date(d.dateStr) : null;
                    return { ...d, dateObj, isValidDate: dateObj && !isNaN(dateObj) };
                });

                const validDeliveries = deliveries
                    .filter(d => d.isValidDate)
                    .sort((a, b) => a.dateObj - b.dateObj);

                let runningAddedStock = 0;
                const results = {};

                for (let i = 0; i < validDeliveries.length; i++) {
                    const d = validDeliveries[i];
                    const diffTime = d.dateObj - today;
                    const daysFromToday = Math.max(0, Math.ceil(diffTime / (1000 * 60 * 60 * 24)));
                    
                    const before = S0 - (daysFromToday * C_daily) + runningAddedStock;
                    const after = before + d.qty;
                    
                    results[d.id] = { before, after };
                    runningAddedStock += d.qty; 
                }

                const getCov = (val) => (val !== null && C_monthly > 0) ? (val / C_monthly).toFixed(1) : '-';

                return {
                    currentCoverage: getCov(S0) === '-' ? '0.0' : getCov(S0),
                    d1: results[1] ? { ...results[1], beforeCovStr: getCov(results[1].before), covStr: getCov(results[1].after) } : { before: null, after: null, beforeCovStr: '-', covStr: '-' },
                    d2: results[2] ? { ...results[2], beforeCovStr: getCov(results[2].before), covStr: getCov(results[2].after) } : { before: null, after: null, beforeCovStr: '-', covStr: '-' },
                    d3: results[3] ? { ...results[3], beforeCovStr: getCov(results[3].before), covStr: getCov(results[3].after) } : { before: null, after: null, beforeCovStr: '-', covStr: '-' },
                };
            };

            const handleChange = (id, field, value) => {
                setItems(items.map(item => item.id === id ? { ...item, [field]: value } : item));
                if (aiInsights[id]) {
                    const newInsights = { ...aiInsights };
                    delete newInsights[id];
                    setAiInsights(newInsights);
                }
            };

            const handleAddItem = () => {
                setItems([{
                    id: Date.now(), name: '', stock: 0, consumption: 0,
                    d1Send: '', d1Qty: 0, d1Date: '', d2Send: '', d2Qty: 0, d2Date: '', d3Send: '', d3Qty: 0, d3Date: ''
                }, ...items]);
            };

            const handleRemoveItem = (id) => {
                setItems(items.filter(item => item.id !== id));
            };

            const handleAiAnalysis = async (item, metrics) => {
                setLoadingAi(prev => ({ ...prev, [item.id]: true }));
                const apiKey = ""; 
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
                
                const prompt = `Ти - досвідчений Supply Chain Manager.
                Всі товари доставляються з Китаю. Загальний цикл логістики: ~110 днів.
                Проаналізуй SKU: "${item.name}".
                - Залишок: ${item.stock} шт. 
                - Витрата: ${item.consumption} шт/міс.
                - Поточне покриття: ${metrics.currentCoverage} міс.
                Очікувані залишки ДО прибуття запланованих поставок (за 1 день до): 
                №1: ${metrics.d1.before !== null ? Math.round(metrics.d1.before) : '-'} шт, 
                №2: ${metrics.d2.before !== null ? Math.round(metrics.d2.before) : '-'} шт.
                Завдання: Враховуючи плече у 110 днів, оціни чи є зараз ризик дефіциту. Дай чітку рекомендацію щодо замовлення. Дай відповідь коротко, списком, українською мовою.`;

                try {
                    const response = await fetch(url, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] }) });
                    const data = await response.json();
                    setAiInsights(prev => ({ ...prev, [item.id]: data.candidates?.[0]?.content?.parts?.[0]?.text || "Помилка відповіді." }));
                } catch (e) {
                    setAiInsights(prev => ({ ...prev, [item.id]: "⚠️ AI недоступний." }));
                } finally {
                    setLoadingAi(prev => ({ ...prev, [item.id]: false }));
                }
            };

            return (
                <div className="w-full">
                    
                    {/* ЗАКРІПЛЕНА ШАПКА (ТОЧНО ПО СКРІНШОТУ) */}
                    <div className="sticky top-0 z-50 bg-white shadow-sm border-b border-slate-200 px-6 py-3 mb-6 w-full flex flex-col md:flex-row items-center justify-between gap-4 transition-all">
                        
                        {/* ЛІВА ЧАСТИНА: Лого та Назва */}
                        <div className="flex items-center gap-4 w-full md:w-auto justify-center md:justify-start shrink-0">
                            <img src="https://foodline-production.com/wp-content/uploads/2021/10/3752781497_3752781497.webp" alt="Foodline" className="h-10 w-auto object-contain"/>
                            <h1 className="text-[26px] font-black text-slate-800 tracking-tight">MRP Import</h1>
                        </div>

                        {/* СЕРЕДНЯ ЧАСТИНА: Дані про оновлення та статус */}
                        <div className="flex items-center gap-6 text-[15px] text-slate-500 font-medium whitespace-nowrap w-full md:w-auto justify-center">
                            <span>Дата/час оновлення даних: <strong className="text-slate-800">{lastUpdated}</strong></span>
                            <span>Статус: <strong className={isImporting ? "text-blue-600" : "text-[#52b788]"}>{isImporting ? 'Оновлення...' : 'Синхронізовано'}</strong></span>
                        </div>

                        {/* ПРАВА ЧАСТИНА: Вертикальні кнопки (одна під одною) */}
                        <div className="flex flex-col items-center md:items-end gap-1.5 w-full md:w-56 shrink-0">
                            <button onClick={() => handleLoadFromGoogle(false)} disabled={isImporting} className="flex justify-center items-center gap-2 w-full md:w-48 py-1.5 bg-white border border-slate-300 text-slate-700 font-bold rounded shadow-sm transition-all hover:bg-slate-50 disabled:opacity-70 text-sm">
                                {isImporting ? <IconLoader className="w-4 h-4 animate-spin text-blue-600" /> : <IconRefresh className="w-4 h-4 text-blue-600" />}
                                Синхронізувати
                            </button>
                            <button onClick={handleAddItem} disabled={isImporting} className="flex justify-center items-center gap-2 w-full md:w-48 py-1.5 bg-[#52b788] hover:bg-[#40916c] text-white font-bold rounded shadow-sm transition-all disabled:opacity-70 text-sm">
                                <IconPlus className="w-4 h-4" />
                                Додати рядок
                            </button>
                        </div>
                    </div>

                    <div className="w-full px-4 overflow-x-auto pb-10">
                        {errorMsg && (
                            <div className="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg flex items-start gap-2 shadow-sm mb-4 max-w-3xl mx-auto">
                                <IconAlert className="w-5 h-5 shrink-0 mt-0.5 text-red-500" />
                                <p className="text-sm font-medium">{errorMsg}</p>
                            </div>
                        )}

                        {isImporting && items.length === 0 ? (
                            <div className="text-center p-12 bg-white rounded-lg border border-slate-200 text-slate-400 font-bold shadow-sm max-w-3xl mx-auto">ЗАВАНТАЖЕННЯ ДАНИХ...</div>
                        ) : (
                            <div className="min-w-max flex flex-col gap-4 max-w-[1450px] mx-auto">
                                {items.map((item) => {
                                    const m = calculateMetrics(item);
                                    const needsOrder = (m.d1.before !== null && m.d1.before < 0) || (m.d2.before !== null && m.d2.before < 0) || (m.d3.before !== null && m.d3.before < 0) || (parseFloat(m.currentCoverage) < 1 && item.consumption > 0);
                                    
                                    return (
                                        <div key={item.id} className={`bg-white rounded-xl shadow-sm border flex flex-col transition-all ${needsOrder ? 'border-red-300 ring-1 ring-red-100' : 'border-slate-200 hover:border-slate-300'}`}>
                                            
                                            {/* ЄДИНИЙ РЯДОК ДЛЯ ДЕСКТОПА */}
                                            <div className="flex flex-row items-stretch">
                                                
                                                {/* ЛІВА ЧАСТИНА: БАЗОВА ІНФО */}
                                                <div className="flex flex-col justify-between p-4 border-r border-slate-200 w-[420px] shrink-0">
                                                    
                                                    <div className="mb-4">
                                                        <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 pl-1">Номенклатура</label>
                                                        <input type="text" value={item.name} onChange={(e) => handleChange(item.id, 'name', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-200 rounded px-3 py-2 text-[14px] focus:ring-1 focus:ring-emerald-500 outline-none shadow-sm transition-shadow" />
                                                    </div>
                                                    
                                                    <div className="flex items-center gap-3">
                                                        <div className="flex-1 min-w-0">
                                                            <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 pl-1 truncate">Залишок (шт)</label>
                                                            <input type="number" value={item.stock} onChange={(e) => handleChange(item.id, 'stock', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-200 rounded px-2.5 py-1.5 text-[14px] focus:ring-1 focus:ring-emerald-500 outline-none shadow-sm transition-shadow" />
                                                        </div>
                                                        <div className="flex-1 min-w-0">
                                                            <label className="block text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1.5 pl-1 truncate">Витрата/міс</label>
                                                            <input type="number" value={item.consumption} onChange={(e) => handleChange(item.id, 'consumption', e.target.value)} className="w-full font-bold text-slate-800 bg-white border border-slate-200 rounded px-2.5 py-1.5 text-[14px] focus:ring-1 focus:ring-emerald-500 outline-none shadow-sm transition-shadow" />
                                                        </div>
                                                        <div className="w-[85px] shrink-0 flex flex-col justify-center items-center pt-2">
                                                            <span className="text-[10px] text-slate-400 font-bold uppercase tracking-widest mb-1">Покриття:</span>
                                                            <span className={`text-[16px] font-black leading-none ${parseFloat(m.currentCoverage) < 1 ? 'text-red-600' : 'text-[#52b788]'}`}>
                                                                {m.currentCoverage} <span className="text-[11px] font-bold">міс.</span>
                                                            </span>
                                                        </div>
                                                        
                                                        <div className="flex flex-col gap-2 shrink-0 ml-1 pt-4">
                                                            <button onClick={() => handleAiAnalysis(item, m)} disabled={loadingAi[item.id]} className="bg-[#7c3aed] hover:bg-[#6d28d9] text-white px-3 py-1.5 rounded text-[10px] font-bold flex gap-1.5 items-center justify-center transition-all shadow-sm disabled:opacity-50">
                                                                {loadingAi[item.id] ? <IconLoader className="animate-spin w-3 h-3" /> : <IconSparkles className="w-3 h-3" />}
                                                                AI Аналіз
                                                            </button>
                                                            <button onClick={() => handleRemoveItem(item.id)} className="bg-white hover:bg-red-50 text-slate-400 hover:text-red-500 border border-slate-200 px-3 py-1.5 rounded text-[10px] font-bold flex gap-1.5 items-center justify-center transition-all shadow-sm">
                                                                <IconTrash className="w-3 h-3" /> Видалити
                                                            </button>
                                                        </div>
                                                    </div>
                                                </div>

                                                {/* ПРАВА ЧАСТИНА: 3 ДОСТАВКИ */}
                                                <div className="flex flex-1 divide-x divide-slate-100 bg-white">
                                                    <DeliveryItem num={1} m={m.d1} sendDate={item.d1Send} date={item.d1Date} qty={item.d1Qty} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                                    <DeliveryItem num={2} m={m.d2} sendDate={item.d2Send} date={item.d2Date} qty={item.d2Qty} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                                    <DeliveryItem num={3} m={m.d3} sendDate={item.d3Send} date={item.d3Date} qty={item.d3Qty} formatNum={formatNum} handleChange={handleChange} itemId={item.id} />
                                                </div>
                                            </div>

                                            {/* НИЖНЯ ЧАСТИНА: AI РЕЗУЛЬТАТ */}
                                            {aiInsights[item.id] && (
                                                <div className="p-4 bg-purple-50 text-sm text-purple-900 border-t border-purple-100 flex items-start gap-3">
                                                    <IconInfo className="w-5 h-5 shrink-0 text-purple-600 mt-0.5" />
                                                    <div className="whitespace-pre-wrap font-medium leading-relaxed text-[13px]">{aiInsights[item.id]}</div>
                                                </div>
                                            )}
                                        </div>
                                    );
                                })}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function DeliveryItem({ num, m, sendDate, date, qty, formatNum, handleChange, itemId }) {
            const isDeficitBefore = m.before !== null && m.before < 0;
            
            let transitDays = '-';
            if (sendDate && date) {
                const s = new Date(sendDate);
                const a = new Date(date);
                if (!isNaN(s) && !isNaN(a)) {
                    transitDays = Math.max(0, Math.round((a - s) / (1000 * 60 * 60 * 24)));
                }
            }

            return (
                <div className="p-4 w-[330px] shrink-0 flex flex-col justify-between relative hover:bg-slate-50 transition-colors">
                    
                    {/* Хедер доставки */}
                    <div className="flex justify-between items-start mb-4">
                        <div className="flex items-center gap-2">
                            <span className="bg-slate-100 text-slate-500 rounded-full w-5 h-5 flex items-center justify-center text-[10px] font-black border border-slate-200">{num}</span>
                            <span className="text-[11px] font-bold text-slate-500 uppercase tracking-widest">Доставка</span>
                        </div>
                        {sendDate && date && transitDays !== '-' && (
                            <span className="text-[11px] font-bold text-blue-600">У дорозі: {transitDays} дн.</span>
                        )}
                    </div>

                    {/* Інпути з min-w-0 для уникнення перекриття. Розширено контейнери для великих чисел */}
                    <div className="flex gap-2 mb-4">
                        <div className="w-[95px] shrink-0">
                            <label className="block text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1 pl-1 truncate">Відправка</label>
                            <input type="date" value={sendDate || ''} onChange={e => handleChange(itemId, `d${num}Send`, e.target.value)} className="w-full text-[10px] font-bold border border-slate-200 rounded px-1.5 py-1.5 focus:ring-1 focus:ring-[#52b788] outline-none text-slate-700 shadow-sm" />
                        </div>
                        <div className="w-[95px] shrink-0">
                            <label className="block text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1 pl-1 truncate">Прибуття</label>
                            <input type="date" value={date || ''} onChange={e => handleChange(itemId, `d${num}Date`, e.target.value)} className="w-full text-[10px] font-bold border border-slate-200 rounded px-1.5 py-1.5 focus:ring-1 focus:ring-[#52b788] outline-none text-slate-700 shadow-sm" />
                        </div>
                        <div className="flex-1 min-w-0">
                            <label className="block text-[8px] font-bold text-slate-400 uppercase tracking-widest mb-1 pl-1 truncate">Кількість (шт)</label>
                            <input type="number" value={qty || ''} onChange={e => handleChange(itemId, `d${num}Qty`, e.target.value)} placeholder="0" className="w-full text-[12px] font-bold border border-slate-200 rounded px-2 py-1.5 focus:ring-1 focus:ring-[#52b788] outline-none text-blue-600 shadow-sm" />
                        </div>
                    </div>

                    {/* Блок розрахунків */}
                    <div className="mt-auto grid grid-cols-[auto_1fr] gap-y-2 items-center px-1 pt-1 border-t border-slate-100">
                        <span className="text-[11px] text-slate-500 font-medium">За 1 день до:</span>
                        <div className="text-right truncate">
                            <span className={`text-[13px] font-black tracking-tight ${isDeficitBefore ? 'text-red-600' : 'text-slate-800'}`}>
                                {m.before !== null ? `${formatNum(m.before)} шт` : '- шт'}
                            </span>
                            <span className={`text-[12px] font-bold ml-1 tracking-tight ${isDeficitBefore ? 'text-red-500' : 'text-slate-800'}`}>
                                {m.beforeCovStr !== null ? `(${m.beforeCovStr} міс)` : '(- міс)'}
                            </span>
                        </div>
                        
                        <span className="text-[11px] text-slate-500 font-medium">Після приходу:</span>
                        <div className="text-right truncate">
                            <span className="text-[13px] font-black text-[#52b788] tracking-tight">
                                {m.after !== null ? `${formatNum(m.after)} шт` : '- шт'}
                            </span>
                            <span className="text-[12px] font-bold text-slate-800 ml-1 tracking-tight">
                                {m.covStr !== null ? `(${m.covStr} міс)` : '(- міс)'}
                            </span>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
